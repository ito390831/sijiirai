<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a4a8a">
<title>指示品依頼書</title>
<style>
*, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: "MS UI Gothic", Meiryo, "Yu Gothic", sans-serif; background: #eef1f6; text-size-adjust: 100%; overscroll-behavior: none; }

/* ===== UI パネル ===== */
.ui-panel { position: fixed; top: 0; left: 0; right: 0; z-index: 300; background: #1a4a8a; padding: env(safe-area-inset-top,0) 0 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.panel-title { color: #fff; font-size: 14px; font-weight: 700; padding: 10px 16px 4px; display: flex; align-items: center; gap: 8px; }
.panel-btns { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
.panel-btns::-webkit-scrollbar { display: none; }
.btn { flex-shrink: 0; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; color: #fff; display: flex; align-items: center; gap: 6px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; white-space: nowrap; }
.btn-scan { background: #f57c00; font-size: 15px; padding: 12px 20px; }
.btn-print { background: #c62828; }
.btn-clear { background: #546e7a; }
.btn:active { filter: brightness(0.85); }
.panel-status { padding: 6px 12px calc(8px + env(safe-area-inset-bottom,0)); }
#status { display: block; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.15); color: #fff; min-height: 30px; line-height: 1.4; }
#status.error { background: #b71c1c; }
#status.info  { background: #01579b; }
#status.ok    { background: #1b5e20; }

/* ===== メインコンテンツ ===== */
#mainContent { padding-top: 130px; padding-bottom: calc(20px + env(safe-area-inset-bottom,0)); }
.empty-guide { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 60vh; padding: 40px 24px; text-align: center; }
.empty-guide .icon { font-size: 64px; opacity: 0.4; }
.empty-guide p { font-size: 14px; color: #666; line-height: 1.6; }
.btn-scan-big { background: #f57c00; color: #fff; border: none; border-radius: 50px; padding: 18px 40px; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(245,124,0,0.4); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.btn-scan-big:active { transform: scale(0.97); }

#slipList { display: flex; flex-direction: column; gap: 12px; padding: 12px 10px; }
.slip-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); overflow: hidden; }
.slip-card-header { background: #1a4a8a; color: #fff; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; }
.slip-card-title { font-size: 13px; font-weight: 700; }
.slip-card-del { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.slip-card-body { padding: 10px 12px; }
.slip-card-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.slip-card-row:last-child { border-bottom: none; }
.slip-card-lbl { color: #666; font-size: 11px; min-width: 70px; }
.slip-card-val { font-weight: 700; text-align: right; }
.slip-card-val.big { font-size: 20px; color: #c62828; }
.slip-card-hinban { font-family: monospace; font-size: 15px; letter-spacing: 1px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin: 1px; }
.badge-full { background: #1565c0; color: #fff; }
.badge-frac { background: #e65100; color: #fff; }

/* ===== カメラスキャンモーダル ===== */
.scan-modal { display: none; position: fixed; inset: 0; z-index: 500; background: #000; flex-direction: column; }
.scan-modal.show { display: flex; }
.scan-header { padding: calc(env(safe-area-inset-top,12px) + 8px) 16px 8px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); position: relative; z-index: 10; }
.scan-header h2 { color: #fff; font-size: 15px; }
.scan-close { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
#qrReaderWrap { flex: 1; position: relative; overflow: hidden; }
#qrReader { width: 100%; height: 100%; }
#qrReader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
.scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.scan-frame { width: min(70vw, 260px); height: min(70vw, 260px); position: relative; }
.scan-frame::before, .scan-frame::after, .scan-frame > span::before, .scan-frame > span::after { content: ""; position: absolute; width: 28px; height: 28px; border-color: #f57c00; border-style: solid; }
.scan-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; }
.scan-frame::after  { top: 0; right: 0; border-width: 4px 4px 0 0; }
.scan-frame > span::before { bottom: 0; left: 0; border-width: 0 0 4px 4px; }
.scan-frame > span::after  { bottom: 0; right: 0; border-width: 0 4px 4px 0; }
.scan-line-anim { position: absolute; left: 4px; right: 4px; height: 2px; background: rgba(245,124,0,0.9); animation: scanMove 2s ease-in-out infinite; }
@keyframes scanMove { 0%,100% { top: 4px; } 50% { top: calc(100% - 6px); } }
.scan-footer { padding: 16px 16px calc(16px + env(safe-area-inset-bottom,0)); background: rgba(0,0,0,0.6); text-align: center; }
#scanStatusText { color: #fff; font-size: 13px; }

/* ===== 印刷エリア（画面上は非表示） ===== */
#printArea { visibility: hidden; height: 0; overflow: hidden; position: absolute; left: -9999px; }

/* ===== 印刷スタイル ===== */
@media print {
  @page { size: A4 portrait; margin: 6mm 5mm; }

  .ui-panel, .scan-modal, #mainContent { display: none !important; }
  body { background: white; }

  #printArea {
    visibility: visible !important;
    height: auto !important;
    overflow: visible !important;
    position: static !important;
    left: 0 !important;
    display: block !important;
    width: 200mm;
  }

  /* 1ページに2列×2段 = 4枚 */
  .print-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3mm;
    width: 200mm;
  }

  /* 2枚ごと（右列の末尾）に改ページ */
  .slip:nth-child(4n) { break-after: page; }
  .slip:last-child    { break-after: auto; }

  /* ===== 1枚の伝票 ===== */
  /* A4(297mm) - margin(12mm) - gap(3mm) / 2列 = 約92.5mm 高さで収める */
  .slip {
    width: 100%;
    border: 2px solid #000;
    font-family: "MS UI Gothic", Meiryo, sans-serif;
    break-inside: avoid;
    overflow: hidden;
    font-size: 0; /* inline-block隙間対策 */
  }

  /* ── タイトル行 ── */
  .f-title {
    height: 16mm;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16pt;
    font-weight: bold;
    letter-spacing: 4px;
  }

  /* ── 品番ブロック ── */
  .f-hinban {
    display: flex;
    border-bottom: 2px solid #000;
  }
  .f-hinban-lbl {
    width: 10mm;
    min-width: 10mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10pt;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 4px;
  }
  .f-hinban-body {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* 確認チェック注釈行 */
  .f-note-row {
    height: 6mm;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    font-size: 6pt;
    padding: 0 2mm;
  }
  .f-note-row:last-child { border-bottom: none; }

  /* 品番値セル */
  .f-hinban-vals {
    height: 11mm;
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-hv-cell {
    flex: 1;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13pt;
    font-weight: bold;
  }
  .f-hv-cell:last-child { border-right: none; }
  .f-hv-sep {
    flex: 0 0 4mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11pt;
    font-weight: bold;
  }

  /* チェック行（作業者/監督者） */
  .f-chk-row {
    height: 6mm;
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-chk-row.last { border-bottom: none; }
  .f-ck-cell {
    flex: 1;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8pt;
  }
  .f-ck-cell:last-child { border-right: none; }
  .f-ck-cell.on { color: #cc0000; font-weight: bold; }
  .f-ck-sep { flex: 0 0 4mm; border-right: 1px solid #000; }

  /* ── 依頼日 + 備考 ── */
  .f-irai {
    height: 12mm;
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-row-lbl {
    width: 10mm;
    min-width: 10mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8pt;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 2px;
  }
  .f-irai-val {
    flex: 1;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11pt;
    font-weight: bold;
  }
  .f-biko {
    width: 32mm;
    min-width: 32mm;
    padding: 1mm 2mm;
    font-size: 6pt;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .f-biko-ttl { font-size: 7pt; font-weight: bold; margin-bottom: 1mm; }
  .f-biko-line { margin-bottom: 1mm; }
  .f-biko-line b { font-weight: bold; }

  /* ── 数量 ── */
  .f-qty {
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-qty-lbl {
    width: 10mm;
    min-width: 10mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8pt;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 2px;
  }
  .f-qty-body {
    flex: 1;
    border-right: 1px solid #000;
    display: flex;
    flex-direction: column;
  }
  .f-qty-hdr {
    height: 5mm;
    border-bottom: 1px solid #000;
  }
  .f-qty-val {
    height: 9mm;
    display: flex;
    align-items: center;
    padding: 0 2mm;
    gap: 1mm;
  }
  .f-qty-num  { font-size: 16pt; font-weight: bold; text-decoration: underline; min-width: 12mm; text-align: center; }
  .f-qty-unit { font-size: 9pt; }
  .f-qty-x    { font-size: 11pt; margin: 0 1mm; }
  .f-qty-box  { font-size: 16pt; font-weight: bold; min-width: 8mm; text-align: center; }

  /* スタンプ欄 */
  .f-stamp-cols { display: flex; }
  .f-stamp-col  { width: 9mm; min-width: 9mm; border-left: 1px solid #000; display: flex; flex-direction: column; }
  .f-stamp-hdr  { height: 5mm; border-bottom: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 5pt; text-align: center; line-height: 1.1; background: #f5f5f5; }
  .f-stamp-sp   { height: 9mm; }

  /* ── 出荷日/便 ── */
  .f-shukka {
    height: 10mm;
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-shukka-lbl {
    width: 10mm;
    min-width: 10mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6pt;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }
  .f-shukka-val {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9pt;
  }

  /* ── 箱種 ── */
  .f-hakoshu {
    height: 10mm;
    display: flex;
    border-bottom: 1px solid #000;
  }
  .f-hakoshu-lbl {
    width: 10mm;
    min-width: 10mm;
    border-right: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8pt;
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 2px;
  }
  .f-hakoshu-val {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 3mm;
    font-size: 11pt;
    font-weight: bold;
  }

  /* ── フッター ── */
  .f-footer {
    height: 10mm;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7.5pt;
    font-weight: bold;
    text-align: center;
    padding: 0 2mm;
  }
}
</style>
</head>
<body>

<!-- ===== 操作パネル ===== -->
<div class="ui-panel">
  <div class="panel-title"><span>📦</span> 指示品依頼書システム</div>
  <div class="panel-btns">
    <button class="btn btn-scan" id="scanBtn">📷 QRスキャン</button>
    <button class="btn btn-print" id="printBtn" style="display:none;">🖨 印刷 / PDF保存</button>
    <button class="btn btn-clear" id="clearBtn">🗑 全消去</button>
  </div>
  <div class="panel-status"><span id="status">📷 QRスキャンボタンを押してください</span></div>
</div>

<!-- ===== メインコンテンツ ===== -->
<div id="mainContent">
  <div class="empty-guide" id="emptyGuide">
    <div class="icon">📋</div>
    <p>現品確認票のQRコードをスキャンすると<br>指示品依頼書が自動生成されます</p>
    <button class="btn-scan-big" id="scanBtnBig">📷 QRコードをスキャン</button>
    <p style="font-size:12px;color:#999;margin-top:8px;">連続スキャン対応 ／ 整数箱＋端数箱 自動分割</p>
  </div>
  <div id="slipList"></div>
  <div id="printArea">
    <div class="print-wrap" id="printWrap"></div>
  </div>
</div>

<!-- ===== カメラスキャンモーダル ===== -->
<div class="scan-modal" id="scanModal">
  <div class="scan-header">
    <h2>📷 QRコードをかざしてください</h2>
    <button class="scan-close" id="scanClose">✕ 閉じる</button>
  </div>
  <div id="qrReaderWrap">
    <div id="qrReader"></div>
    <div class="scan-overlay">
      <div class="scan-frame"><span></span><div class="scan-line-anim"></div></div>
    </div>
  </div>
  <div class="scan-footer"><div id="scanStatusText">スキャン待機中...</div></div>
</div>

<!-- html5-qrcode CDN -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// ========== 状態管理 ==========
let slips = [];          // 生成済みスリップ一覧
let html5QrCode = null;
let scanning = false;

// ========== QRデータ解析 ==========
// 想定フォーマット: "品番,個数/箱,出荷日,便,箱種,備考" または
//                  タブ区切り、スペース区切りなど柔軟に対応
function parseQR(raw) {
  const s = raw.trim();
  // タブ区切り or カンマ区切り
  const sep = s.includes('\t') ? '\t' : ',';
  const parts = s.split(sep).map(p => p.trim());

  const hinban    = parts[0] || '';
  const perBox    = parseInt(parts[1]) || 1;   // 1箱あたりの個数
  const totalQty  = parseInt(parts[2]) || 1;   // 総個数
  const shukkaDate= parts[3] || '';            // 出荷日
  const bin       = parts[4] || '';            // 便
  const hakoshu   = parts[5] || '';            // 箱種
  const biko      = parts[6] || '';            // 備考

  // 整数箱 + 端数箱 自動分割
  const fullBoxes = Math.floor(totalQty / perBox);
  const fracQty   = totalQty % perBox;

  const result = [];
  if (fullBoxes > 0) {
    result.push({ hinban, qty: perBox, boxes: fullBoxes, shukkaDate, bin, hakoshu, biko, type: 'full' });
  }
  if (fracQty > 0) {
    result.push({ hinban, qty: fracQty, boxes: 1, shukkaDate, bin, hakoshu, biko, type: 'frac' });
  }
  if (result.length === 0) {
    result.push({ hinban, qty: totalQty, boxes: 1, shukkaDate, bin, hakoshu, biko, type: 'full' });
  }
  return result;
}

// ========== スリップHTML生成（印刷用） ==========
function buildSlipHTML(d, idx) {
  const today = new Date();
  const mm = today.getMonth() + 1;
  const dd = today.getDate();
  const iraiDate = `${mm}月${dd}日`;

  // 出荷日/便テキスト
  const shukkaText = [d.shukkaDate, d.bin ? d.bin + '便' : ''].filter(Boolean).join(' ') || '　';

  return `
<div class="slip" id="slip-${idx}">
  <!-- タイトル -->
  <div class="f-title">指示品依頼書</div>

  <!-- 品番ブロック -->
  <div class="f-hinban">
    <div class="f-hinban-lbl">品番</div>
    <div class="f-hinban-body">
      <div class="f-note-row">○ ○ ○ ○ ○ ○ ○ ○ ○ ○　←かんばんから転記時に確認。</div>
      <div class="f-hinban-vals">
        ${d.hinban.split('').slice(0,5).map(c=>`<div class="f-hv-cell">${c}</div>`).join('')}
        <div class="f-hv-sep">－</div>
        ${d.hinban.split('').slice(5).map(c=>`<div class="f-hv-cell">${c}</div>`).join('')}
      </div>
      <div class="f-note-row">○ ○ ○ ○ ○ ○ ○ ○ ○ ○　←見本準備時に作業者が確認。</div>
      <div class="f-note-row" style="border-bottom:none;">○ ○ ○ ○ ○ ○ ○ ○ ○ ○　←次工程へ渡し時に監督者が確認</div>
    </div>
  </div>

  <!-- 依頼日 + 備考 -->
  <div class="f-irai">
    <div class="f-row-lbl">依頼日</div>
    <div class="f-irai-val">${iraiDate}</div>
    <div class="f-biko">
      <div class="f-biko-ttl">&lt;備考欄&gt;</div>
      ${d.biko ? `<div class="f-biko-line">${d.biko}</div>` : '<div class="f-biko-line">　</div>'}
    </div>
  </div>

  <!-- 数量 -->
  <div class="f-qty">
    <div class="f-qty-lbl">数量</div>
    <div class="f-qty-body">
      <div class="f-qty-hdr"></div>
      <div class="f-qty-val">
        <div class="f-qty-num">${d.qty}</div>
        <div class="f-qty-unit">個</div>
        <div class="f-qty-x">×</div>
        <div class="f-qty-box">${d.boxes}</div>
        <div class="f-qty-unit">箱</div>
      </div>
    </div>
    <div class="f-stamp-cols">
      <div class="f-stamp-col">
        <div class="f-stamp-hdr">ﾁｪｯｸ<br>作業者</div>
        <div class="f-stamp-sp"></div>
      </div>
      <div class="f-stamp-col">
        <div class="f-stamp-hdr">ﾁｪｯｸ<br>監督者</div>
        <div class="f-stamp-sp"></div>
      </div>
    </div>
  </div>

  <!-- 出荷日/便 -->
  <div class="f-shukka">
    <div class="f-shukka-lbl">出荷日<br>日/便</div>
    <div class="f-shukka-val">${shukkaText}　まで　森町便</div>
  </div>

  <!-- 箱種 -->
  <div class="f-hakoshu">
    <div class="f-hakoshu-lbl">箱種</div>
    <div class="f-hakoshu-val">${d.hakoshu || '　'}</div>
  </div>

  <!-- フッター -->
  <div class="f-footer">受付者はこの依頼書を製品に付けて依頼者へ渡して下さい</div>
</div>`;
}

// ========== スリップカード生成（画面表示用） ==========
function buildCardHTML(d, slipIdx, cardIdx) {
  const typeBadge = d.type === 'full'
    ? `<span class="badge badge-full">整数箱</span>`
    : `<span class="badge badge-frac">端数箱</span>`;
  return `
<div class="slip-card" id="card-${cardIdx}">
  <div class="slip-card-header">
    <div class="slip-card-title">📋 伝票 #${cardIdx+1}　${typeBadge}</div>
    <button class="slip-card-del" onclick="deleteSlip(${cardIdx})">✕ 削除</button>
  </div>
  <div class="slip-card-body">
    <div class="slip-card-row">
      <span class="slip-card-lbl">品番</span>
      <span class="slip-card-val slip-card-hinban">${d.hinban}</span>
    </div>
    <div class="slip-card-row">
      <span class="slip-card-lbl">数量</span>
      <span class="slip-card-val big">${d.qty}個 × ${d.boxes}箱</span>
    </div>
    ${d.shukkaDate ? `<div class="slip-card-row"><span class="slip-card-lbl">出荷日</span><span class="slip-card-val">${d.shukkaDate}${d.bin ? ' '+d.bin+'便' : ''}</span></div>` : ''}
    ${d.hakoshu ? `<div class="slip-card-row"><span class="slip-card-lbl">箱種</span><span class="slip-card-val">${d.hakoshu}</span></div>` : ''}
    ${d.biko ? `<div class="slip-card-row"><span class="slip-card-lbl">備考</span><span class="slip-card-val">${d.biko}</span></div>` : ''}
  </div>
</div>`;
}

// ========== UI更新 ==========
function render() {
  const emptyGuide = document.getElementById('emptyGuide');
  const slipList   = document.getElementById('slipList');
  const printWrap  = document.getElementById('printWrap');
  const printBtn   = document.getElementById('printBtn');

  if (slips.length === 0) {
    emptyGuide.style.display = 'flex';
    slipList.innerHTML = '';
    printWrap.innerHTML = '';
    printBtn.style.display = 'none';
    return;
  }

  emptyGuide.style.display = 'none';
  printBtn.style.display = 'flex';

  // 画面表示カード
  slipList.innerHTML = slips.map((d,i) => buildCardHTML(d, i, i)).join('');
  // 印刷用スリップ
  printWrap.innerHTML = slips.map((d,i) => buildSlipHTML(d, i)).join('');
}

function deleteSlip(idx) {
  slips.splice(idx, 1);
  render();
  setStatus(`伝票 #${idx+1} を削除しました`, 'info');
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

// ========== QRスキャン ==========
function openScanner() {
  document.getElementById('scanModal').classList.add('show');
  setStatus('カメラ起動中...', 'info');
  document.getElementById('scanStatusText').textContent = 'カメラ起動中...';

  html5QrCode = new Html5Qrcode('qrReader');
  const config = { fps: 15, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 };

  html5QrCode.start(
    { facingMode: 'environment' },
    config,
    onScanSuccess,
    () => {}
  ).then(() => {
    scanning = true;
    document.getElementById('scanStatusText').textContent = 'QRコードをかざしてください';
    setStatus('📷 スキャン中...', 'info');
  }).catch(err => {
    setStatus('❌ カメラ起動失敗: ' + err, 'error');
    document.getElementById('scanStatusText').textContent = 'カメラ起動失敗';
  });
}

function closeScanner() {
  if (html5QrCode && scanning) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      scanning = false;
    }).catch(()=>{});
  }
  document.getElementById('scanModal').classList.remove('show');
  setStatus(slips.length ? `✅ ${slips.length}件 登録済み` : '📷 QRスキャンボタンを押してください', slips.length ? 'ok' : '');
}

let lastScanTime = 0;
function onScanSuccess(decodedText) {
  const now = Date.now();
  if (now - lastScanTime < 2000) return; // 2秒クールダウン
  lastScanTime = now;

  try {
    const newSlips = parseQR(decodedText);
    slips.push(...newSlips);
    render();
    const msg = `✅ スキャン成功！ (${newSlips.length}件追加) 合計${slips.length}件`;
    setStatus(msg, 'ok');
    document.getElementById('scanStatusText').textContent = msg;
    // 振動フィードバック（対応端末）
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  } catch(e) {
    setStatus('❌ データ解析エラー: ' + e.message, 'error');
  }
}

// ========== イベント登録 ==========
document.getElementById('scanBtn').addEventListener('click', openScanner);
document.getElementById('scanBtnBig').addEventListener('click', openScanner);
document.getElementById('scanClose').addEventListener('click', closeScanner);
document.getElementById('printBtn').addEventListener('click', () => window.print());
document.getElementById('clearBtn').addEventListener('click', () => {
  if (slips.length === 0 || confirm('全ての伝票を消去しますか？')) {
    slips = [];
    render();
    setStatus('🗑 全消去しました', 'info');
  }
});
</script>
</body>
</html>
