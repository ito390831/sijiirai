<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>指示品依頼書システム</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --paper-w: 180mm;
      --paper-h: 85mm;
      --border: 0.35mm solid #000;
      --thin: 0.2mm solid #000;
      --font: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      font-family: var(--font);
      margin:0;
      background:#f4f6f8;
      color:#111;
    }
    .app{
      max-width:980px;
      margin:0 auto;
      padding:12px;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    button{
      padding:12px 16px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#1565c0;
      color:#fff;
    }
    button.secondary{ background:#546e7a; }
    button.danger{ background:#c62828; }
    #status{
      background:#fff;
      border-radius:10px;
      padding:10px 12px;
      margin-bottom:12px;
      border:1px solid #d0d7de;
      white-space:pre-wrap;
      font-size:14px;
    }
    #reader{
      width:100%;
      max-width:420px;
      margin:0 auto 12px auto;
      display:none;
      background:#fff;
      padding:8px;
      border-radius:12px;
    }
    .preview-wrap{
      background:#dde3ea;
      padding:10px;
      border-radius:12px;
      overflow:auto;
    }
    .a4-preview{
      width:210mm;
      min-height:297mm;
      background:#fff;
      margin:0 auto;
      padding:8mm;
      display:flex;
      flex-direction:column;
      gap:4mm;
      box-shadow:0 1mm 4mm rgba(0,0,0,.15);
    }
    .slip{
      width:180mm;
      height:85mm;
      border:var(--border);
      background:#fff;
      margin:0 auto;
      overflow:hidden;
    }
    .slip table{
      width:100%;
      height:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }
    .slip td{
      border:var(--thin);
      padding:0.4mm 0.8mm;
      vertical-align:middle;
      font-size:2.55mm;
      line-height:1.1;
      overflow:hidden;
      word-break:break-word;
    }
    .no-b{ border:none !important; }
    .title{
      font-size:6.2mm !important;
      font-weight:400;
      letter-spacing:0.2mm;
      text-align:left;
      padding-left:3mm !important;
    }
    .title-sub{
      font-size:2.5mm !important;
      font-weight:700;
      text-align:right;
      padding-right:1.5mm !important;
    }
    .flow-head{
      font-size:2.3mm !important;
      text-align:center;
      background:#fafafa;
      white-space:nowrap;
    }
    .flow-cell{
      text-align:center;
      position:relative;
      font-size:4mm !important;
      font-weight:700;
    }
    .flow-cell::after{
      content:"➡";
      position:absolute;
      right:-2.5mm;
      top:50%;
      transform:translateY(-50%);
      font-size:3.6mm;
      background:#fff;
      padding:0 0.3mm;
    }
    .flow-cell.last::after{ content:""; }
    .flow-note{
      font-size:1.5mm !important;
      text-align:center;
      white-space:nowrap;
    }
    .label{
      width:100%;
      font-size:3.2mm !important;
      text-align:left;
      white-space:nowrap;
    }
    .label-center{
      font-size:3.2mm !important;
      text-align:center;
      white-space:nowrap;
    }
    .small{
      font-size:1.9mm !important;
      line-height:1.15;
    }
    .tiny{
      font-size:1.55mm !important;
      line-height:1.12;
    }
    .center{ text-align:center; }
    .right{ text-align:right; }
    .bold{ font-weight:700; }
    .part-box{
      height:8mm;
      text-align:center;
      font-size:4.4mm !important;
      font-weight:400;
    }
    .dash-box{
      font-size:4.2mm !important;
      text-align:center;
    }
    .circle-box{
      text-align:center;
      font-size:4.2mm !important;
      letter-spacing:0.1mm;
    }
    .confirm-lines{
      padding-left:1.5mm !important;
      font-size:2.1mm !important;
      line-height:1.4;
    }
    .date-big{
      text-align:center;
      font-size:4.2mm !important;
    }
    .qty-main{
      font-size:4.8mm !important;
      text-align:center;
      white-space:nowrap;
    }
    .qty-num{
      display:inline-block;
      min-width:16mm;
      border-bottom:var(--thin);
      text-align:center;
      font-weight:700;
    }
    .ship{
      font-size:2.4mm !important;
      white-space:nowrap;
    }
    .stamp-head{
      font-size:2.15mm !important;
      text-align:center;
      background:#fafafa;
      white-space:nowrap;
    }
    .stamp-space{
      height:10.5mm;
      background:#fff;
    }
    .reconfirm{
      text-align:center;
      font-size:5.2mm !important;
      letter-spacing:0.8mm;
      white-space:nowrap;
    }
    .ok-cell{
      text-align:center;
      padding:0 !important;
    }
    .ok-mark{
      width:10mm;
      height:10mm;
      line-height:9.2mm;
      margin:0 auto;
      border:var(--thin);
      border-radius:50%;
      font-size:3.4mm;
      font-weight:700;
    }
    .footer{
      text-align:center;
      font-size:3.1mm !important;
      white-space:nowrap;
    }
    .hidden-render{
      position:fixed;
      left:-99999px;
      top:0;
      width:210mm;
      background:#fff;
      padding:8mm;
    }
    @media print{
      body{ background:#fff; }
      .app > :not(.preview-wrap){ display:none !important; }
      .preview-wrap{ background:#fff; padding:0; }
      .a4-preview{ box-shadow:none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button onclick="openScanner()">QRスキャン開始</button>
      <button class="secondary" onclick="stopScanner()">QRスキャン停止</button>
      <button class="secondary" onclick="testSample1()">サンプル1</button>
      <button class="secondary" onclick="testSample2()">サンプル2</button>
      <button class="danger" onclick="clearSlips()">プレビュー消去</button>
      <button onclick="generatePDF()">PDF出力</button>
    </div>

    <div id="status">待機中</div>
    <div id="reader"></div>

    <div class="preview-wrap">
      <div id="preview" class="a4-preview"></div>
    </div>
  </div>

  <div id="pdfRenderRoot" class="hidden-render"></div>

  <script>
    const { jsPDF } = window.jspdf;
    let html5QrCode = null;
    let slips = [];
    let lastScanText = "";
    let lastScanTime = 0;

    function setStatus(msg){
      document.getElementById("status").textContent = msg;
    }

    function todayJp(){
      const d = new Date();
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    }

    function formatNouhinDate(yyyymmdd){
      if(!yyyymmdd || yyyymmdd.length !== 8) return "";
      return `${parseInt(yyyymmdd.slice(4,6),10)}月${parseInt(yyyymmdd.slice(6,8),10)}日`;
    }

    function parseQR(text){
      const qr = (text || "").trim();
      if(qr.length < 60) throw new Error("QRデータが短すぎます");

      const nouhinDate = qr.slice(5,13);
      const nouhinNo = qr.slice(15,22);
      const partRaw = qr.slice(29,39);
      const totalQty = parseInt(qr.slice(41,47),10);
      const boxType = qr.slice(47,52);
      const capacity = parseInt(qr.slice(52,57),10);
      const boxCountRaw = parseInt(qr.slice(59,60),10);

      const partNo = `${partRaw.slice(0,5)}-${partRaw.slice(5,10)}`;

      return {
        raw: qr,
        nouhinDate,
        nouhinNo,
        partRaw,
        partNo,
        totalQty,
        boxType,
        capacity,
        boxCountRaw
      };
    }

    function createSlipData(parsed){
      const fullBoxes = Math.floor(parsed.totalQty / parsed.capacity);
      const fraction = parsed.totalQty % parsed.capacity;
      const list = [];

      if(fullBoxes > 0){
        list.push({
          kind: fraction > 0 ? "整数箱" : "",
          qty: parsed.capacity,
          boxes: fullBoxes,
          parsed
        });
      }
      if(fraction > 0){
        list.push({
          kind: "端数箱",
          qty: fraction,
          boxes: 1,
          parsed
        });
      }
      if(list.length === 0 && parsed.totalQty > 0){
        list.push({
          kind: "",
          qty: parsed.totalQty,
          boxes: parsed.boxCountRaw || 1,
          parsed
        });
      }
      return list;
    }

    function partCells(partNo){
      const chars = partNo.replace("-", "").split("");
      const left = chars.slice(0,5);
      const right = chars.slice(5,10);
      return { left, right };
    }

    function buildSlipHTML(slip){
      const p = slip.parsed;
      const parts = partCells(p.partNo);
      const titleSub = slip.kind ? `【${slip.kind}】` : "";
      const noteDate = formatNouhinDate(p.nouhinDate);

      return `
      <div class="slip">
        <table>
          <colgroup>
            <col style="width:10%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
            <col style="width:8%">
          </colgroup>

          <tr style="height:12%">
            <td class="title bold" colspan="5">指示品依頼書</td>
            <td class="title-sub" colspan="1">${titleSub}</td>
            <td class="flow-head">依頼者</td>
            <td class="flow-head">監督者</td>
            <td class="flow-head">作業者</td>
            <td class="flow-head">受容者(部品)</td>
            <td class="flow-head" colspan="2">最終検印(受付者)</td>
          </tr>

          <tr style="height:10%">
            <td class="no-b" colspan="6"></td>
            <td class="flow-cell">➡</td>
            <td class="flow-cell">➡</td>
            <td class="flow-cell">➡</td>
            <td class="flow-cell">➡</td>
            <td class="flow-note tiny" colspan="2"></td>
          </tr>

          <tr style="height:9%">
            <td class="label" rowspan="3">品番</td>
            ${parts.left.map(c=>`<td class="part-box">${c}</td>`).join("")}
            <td class="dash-box">-</td>
            ${parts.right.map(c=>`<td class="part-box">${c}</td>`).join("")}
            <td class="confirm-lines tiny" colspan="2" rowspan="3">
              ○-かんばんから転記時に確認。<br>
              ○-見本準備時に作業者が確認。<br>
              ○-次工程へ渡し時に監督者が確認。
            </td>
          </tr>

          <tr style="height:7%">
            ${new Array(5).fill('<td class="circle-box">○</td>').join("")}
            <td class="circle-box"></td>
            ${new Array(5).fill('<td class="circle-box">○</td>').join("")}
          </tr>

          <tr style="height:7%">
            ${new Array(5).fill('<td class="circle-box">○</td>').join("")}
            <td class="circle-box"></td>
            ${new Array(5).fill('<td class="circle-box">○</td>').join("")}
          </tr>

          <tr style="height:10%">
            <td class="label">依頼日</td>
            <td class="date-big" colspan="5">${todayJp()}</td>
            <td class="stamp-head">作業者印</td>
            <td class="stamp-head">監督者</td>
            <td class="stamp-head">監督者印</td>
            <td class="stamp-head" colspan="3"></td>
          </tr>

          <tr style="height:12%">
            <td class="label">数量</td>
            <td class="qty-main" colspan="5">
              <span class="qty-num">${slip.qty}</span> 個 ×
              <span class="qty-num">${slip.boxes}</span> 箱
            </td>
            <td class="stamp-space"></td>
            <td class="stamp-space"></td>
            <td class="stamp-space"></td>
            <td class="tiny" colspan="3" rowspan="2">
              トヨタ向け品・補給品<br>
              バンパー類<br>
              品揃え室で確認印
            </td>
          </tr>

          <tr style="height:10%">
            <td class="label tiny">出荷日 / 便</td>
            <td class="ship center" colspan="5">　月　　日　：　まで　　森町便　　フタバ便</td>
            <td class="label-center tiny" colspan="3">数量・荷姿まとめ・記入に間違いがないか</td>
          </tr>

          <tr style="height:10%">
            <td class="label">箱種</td>
            <td class="date-big" colspan="5">${p.boxType}</td>
            <td class="reconfirm bold" colspan="3">再・確・認</td>
            <td class="ok-cell" colspan="2"><div class="ok-mark">OK!</div></td>
            <td class="no-b"></td>
          </tr>

          <tr style="height:13%">
            <td class="tiny" colspan="8">
              ＜備考欄＞<br>
              ・顧客納入日：${noteDate}<br>
              ・納品書番号：${p.nouhinNo}
            </td>
            <td class="tiny" colspan="4"></td>
          </tr>

          <tr style="height:10%">
            <td class="footer" colspan="12">受付者はこの依頼書を製品に付けて依頼者へ渡して下さい</td>
          </tr>
        </table>
      </div>`;
    }

    function renderPreview(){
      const preview = document.getElementById("preview");
      preview.innerHTML = "";

      if(slips.length === 0){
        preview.innerHTML = '<div style="text-align:center;padding:20mm 0;color:#666;">ここにプレビューが表示されます</div>';
        return;
      }

      slips.forEach(slip => {
        preview.insertAdjacentHTML("beforeend", buildSlipHTML(slip));
      });
    }

    function processQRData(text){
      try{
        const now = Date.now();
        if(text === lastScanText && now - lastScanTime < 3000){
          setStatus("同じQRを3秒以内に再読取したためスキップしました");
          return;
        }
        lastScanText = text;
        lastScanTime = now;

        const parsed = parseQR(text);
        const created = createSlipData(parsed);
        slips.push(...created);
        renderPreview();

        const msg = [
          `読取成功`,
          `品番: ${parsed.partNo}`,
          `総納入数: ${parsed.totalQty}`,
          `収容数: ${parsed.capacity}`,
          `箱種: ${parsed.boxType}`,
          `発行枚数: ${created.length}`
        ].join("\n");
        setStatus(msg);
      }catch(e){
        setStatus("QR解析エラー: " + e.message);
      }
    }

    async function openScanner(){
      try{
        document.getElementById("reader").style.display = "block";
        if(!html5QrCode){
          html5QrCode = new Html5Qrcode("reader");
        }
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 240, height: 240 } },
          decodedText => processQRData(decodedText),
          () => {}
        );
        setStatus("QRスキャン中");
      }catch(e){
        setStatus("カメラ起動エラー: " + e.message);
      }
    }

    async function stopScanner(){
      try{
        if(html5QrCode){
          await html5QrCode.stop();
          await html5QrCode.clear();
          html5QrCode = null;
        }
        document.getElementById("reader").style.display = "none";
        setStatus("QRスキャン停止");
      }catch(e){
        setStatus("停止エラー: " + e.message);
      }
    }

    function clearSlips(){
      slips = [];
      renderPreview();
      setStatus("プレビューを消去しました");
    }

    function testSample1(){
      processQRData("344212026032391T6580215E9D929781111090A00000200TP36200200001");
    }

    function testSample2(){
      processQRData("3442F2026032691T6683085E9D524856568865000001200TP33101000002");
    }

    async function generatePDF(){
      if(slips.length === 0){
        setStatus("PDF出力対象がありません");
        return;
      }

      try{
        setStatus("PDF生成中...");
        const root = document.getElementById("pdfRenderRoot");
        root.innerHTML = "";

        const pages = [];
        for(let i=0; i<slips.length; i+=2){
          const page = document.createElement("div");
          page.className = "a4-preview";
          page.style.boxShadow = "none";
          page.style.margin = "0";
          page.style.pageBreakAfter = "always";
          page.innerHTML = buildSlipHTML(slips[i]);
          if(slips[i+1]){
            page.innerHTML += buildSlipHTML(slips[i+1]);
          }
          pages.push(page);
          root.appendChild(page);
        }

        const pdf = new jsPDF("p", "mm", "a4");
        for(let i=0; i<pages.length; i++){
          const canvas = await html2canvas(pages[i], {
            scale: 3,
            backgroundColor: "#ffffff",
            useCORS: true
          });
          const imgData = canvas.toDataURL("image/jpeg", 1.0);
          if(i > 0) pdf.addPage();
          pdf.addImage(imgData, "JPEG", 0, 0, 210, 297);
        }

        pdf.save(`指示品依頼書_${new Date().toISOString().slice(0,10)}.pdf`);
        setStatus("PDF出力が完了しました");
      }catch(e){
        setStatus("PDF生成エラー: " + e.message);
      }
    }

    renderPreview();
  </script>
</body>
</html>
