<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a4a8a">
    <title>指示品依頼書</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
    /* ============================================================
       リセット & ベース
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Yu Gothic", sans-serif;
        background: #eef1f6;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
    }

    /* ============================================================
       スマホ用 操作パネル（固定ヘッダー）
    ============================================================ */
    .ui-panel {
        position: fixed; top: 0; left: 0; right: 0; z-index: 300;
        background: #1a4a8a;
        padding: env(safe-area-inset-top, 0) 0 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .panel-title {
        color: #fff; font-size: 14px; font-weight: 700;
        padding: 10px 16px 4px;
        display: flex; align-items: center; gap: 8px;
    }
    .panel-title span { font-size: 18px; }

    /* ボタン行 */
    .panel-btns {
        display: flex; gap: 8px; padding: 8px 12px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }
    .panel-btns::-webkit-scrollbar { display: none; }

    .btn {
        flex-shrink: 0;
        border: none; border-radius: 8px;
        padding: 10px 16px; font-size: 14px; font-weight: 700;
        cursor: pointer; color: #fff;
        display: flex; align-items: center; gap: 6px;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        white-space: nowrap;
    }
    .btn-scan  { background: #f57c00; font-size: 15px; padding: 12px 20px; }
    .btn-add   { background: #2e7d32; }
    .btn-clear { background: #546e7a; }
    .btn-print { background: #c62828; display: none; }
    .btn:active { filter: brightness(0.85); }

    /* ステータス行 */
    .panel-status {
        padding: 6px 12px 8px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
    }
    #status {
        display: block; font-size: 12px; font-weight: 600;
        padding: 6px 10px; border-radius: 6px;
        background: rgba(255,255,255,0.15); color: #fff;
        min-height: 30px; line-height: 1.4;
    }
    #status.error { background: #b71c1c; }
    #status.info  { background: #01579b; }
    #status.ok    { background: #1b5e20; }

    /* ============================================================
       メインコンテンツ（ヘッダー分のpadding）
    ============================================================ */
    #mainContent {
        padding-top: 140px; /* ヘッダー高さ分 */
        padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
    }

    /* 空状態のガイド */
    .empty-guide {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px;
        min-height: 60vh; padding: 40px 24px; text-align: center;
    }
    .empty-guide .icon { font-size: 64px; opacity: 0.4; }
    .empty-guide p { font-size: 14px; color: #666; line-height: 1.6; }
    .btn-scan-big {
        background: #f57c00; color: #fff; border: none;
        border-radius: 50px; padding: 18px 40px;
        font-size: 18px; font-weight: 700; cursor: pointer;
        box-shadow: 0 4px 16px rgba(245,124,0,0.4);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .btn-scan-big:active { transform: scale(0.97); }

    /* ============================================================
       伝票リスト（スクロール表示）
    ============================================================ */
    #slipList {
        display: flex; flex-direction: column; gap: 12px;
        padding: 12px 10px;
    }

    /* スマホ画面用プレビューカード */
    .slip-card {
        background: #fff; border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        overflow: hidden; position: relative;
    }
    .slip-card-header {
        background: #1a4a8a; color: #fff;
        padding: 8px 12px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .slip-card-title { font-size: 13px; font-weight: 700; }
    .slip-card-del {
        background: rgba(255,255,255,0.2); border: none; color: #fff;
        border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    .slip-card-body { padding: 10px 12px; }
    .slip-card-row {
        display: flex; justify-content: space-between; align-items: baseline;
        padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px;
    }
    .slip-card-row:last-child { border-bottom: none; }
    .slip-card-lbl { color: #666; font-size: 11px; min-width: 70px; }
    .slip-card-val { font-weight: 700; text-align: right; }
    .slip-card-val.big { font-size: 20px; color: #c62828; }
    .slip-card-hinban { font-family: monospace; font-size: 15px; letter-spacing: 1px; }

    /* ============================================================
       カメラスキャン モーダル（フルスクリーン）
    ============================================================ */
    .scan-modal {
        display: none; position: fixed; inset: 0; z-index: 500;
        background: #000;
        flex-direction: column;
    }
    .scan-modal.show { display: flex; }

    .scan-header {
        padding: calc(env(safe-area-inset-top, 12px) + 8px) 16px 8px;
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(0,0,0,0.6); position: relative; z-index: 10;
    }
    .scan-header h2 { color: #fff; font-size: 15px; }
    .scan-close {
        background: rgba(255,255,255,0.2); border: none; color: #fff;
        border-radius: 8px; padding: 8px 16px; font-size: 14px;
        font-weight: 700; cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }

    #qrReaderWrap {
        flex: 1; position: relative; overflow: hidden;
    }
    #qrReader {
        width: 100%; height: 100%;
    }
    /* html5-qrcodeが生成するvideoを全画面に */
    #qrReader video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
    }
    /* スキャン枠オーバーレイ */
    .scan-overlay {
        position: absolute; inset: 0; pointer-events: none;
        display: flex; align-items: center; justify-content: center;
    }
    .scan-frame {
        width: min(70vw, 260px); height: min(70vw, 260px);
        position: relative;
    }
    .scan-frame::before, .scan-frame::after,
    .scan-frame > span::before, .scan-frame > span::after {
        content: ''; position: absolute;
        width: 28px; height: 28px;
        border-color: #f57c00; border-style: solid;
    }
    .scan-frame::before  { top: 0; left: 0;  border-width: 4px 0 0 4px; }
    .scan-frame::after   { top: 0; right: 0; border-width: 4px 4px 0 0; }
    .scan-frame > span::before  { bottom: 0; left: 0;  border-width: 0 0 4px 4px; }
    .scan-frame > span::after   { bottom: 0; right: 0; border-width: 0 4px 4px 0; }
    .scan-line-anim {
        position: absolute; left: 4px; right: 4px;
        height: 2px; background: rgba(245,124,0,0.9);
        animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove { 0%{top:4px} 50%{top:calc(100% - 6px)} 100%{top:4px} }

    .scan-footer {
        padding: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
        background: rgba(0,0,0,0.6);
        text-align: center;
    }
    #scanStatusText { color: #fff; font-size: 13px; }

    /* ============================================================
       印刷用スタイル（B5縦・2枚横並び）
    ============================================================ */
    @media print {
        @page { size: A4 portrait; margin: 6mm; }
        .ui-panel, .scan-modal, .slip-card-del, #mainContent > *:not(#printArea) { display: none !important; }
        body { background: white; padding: 0; }
        #mainContent { padding: 0; }
        #printArea { display: block !important; }
    }

    #printArea {
        display: none; /* 画面では非表示、印刷時のみ表示 */
    }

    @media print {
        #slipList { display: none; }
        #printArea { display: block; }

        .print-wrap {
            display: flex; flex-wrap: wrap; gap: 4mm;
        }
        /* ===== 印刷伝票 ===== */
        .slip {
            width: 85mm; border: 1.5px solid #000;
            background: #fff; font-family: "MS UI Gothic","Meiryo",sans-serif;
            page-break-inside: avoid; break-inside: avoid;
        }
        .slip:nth-child(2n)   { page-break-after: always; }
        .slip:last-child      { page-break-after: auto; }

        .s-title {
            text-align: center; font-size: 10pt; font-weight: bold;
            letter-spacing: 3px; padding: 2px 0; border-bottom: 1.5px solid #000;
        }
        .s-main { display: flex; border-bottom: 1.5px solid #000; }
        .s-body { flex: 1; border-right: 1.5px solid #000; }

        .s-flow { width: 15mm; min-width: 15mm; display: flex; flex-direction: column; }
        .flow-title { font-size: 5pt; font-weight: bold; text-align: center; border-bottom: 1px solid #000; padding: 1px 0; background: #f0f0f0; }
        .flow-steps { flex: 1; display: flex; flex-direction: column; padding: 2px; justify-content: space-evenly; }
        .flow-step { border: 1px solid #000; text-align: center; padding: 1px; font-size: 6pt; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 7mm; }
        .flow-arrow { text-align: center; font-size: 7pt; color: #444; line-height: 1.1; }

        .hinban-area { display: flex; border-bottom: 1px solid #000; }
        .hinban-label { writing-mode: vertical-rl; text-orientation: upright; display: flex; align-items: center; justify-content: center; font-size: 7pt; font-weight: bold; width: 6mm; min-width: 6mm; border-right: 1px solid #000; letter-spacing: 3px; padding: 2px 1px; }
        .hinban-right { flex: 1; display: flex; flex-direction: column; }
        .note-row { font-size: 5pt; padding: 1px 3px; border-bottom: 1px solid #000; min-height: 5mm; display: flex; align-items: center; }
        .check-row { display: flex; border-bottom: 1px solid #000; height: 6mm; }
        .val-row   { display: flex; border-bottom: 1px solid #000; height: 9mm; }
        .hd { flex: 1; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 6pt; }
        .hd.sep { flex: 0 0 4mm; }
        .hd:last-child { border-right: none; }
        .hv { flex: 1; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 9pt; font-weight: bold; }
        .hv.sep { flex: 0 0 4mm; font-size: 8pt; }
        .hv:last-child { border-right: none; }
        .chk { display: inline-flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 6.5pt; }
        .chk.on { color: #c00; font-weight: bold; }

        .row-lbl { width: 6mm; min-width: 6mm; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 6pt; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px; padding: 2px 1px; }
        .row-cnt { flex: 1; display: flex; align-items: center; padding: 2px 4px; }
        .irai-row { display: flex; border-bottom: 1px solid #000; min-height: 10mm; }
        .qty-row { display: flex; border-bottom: 1px solid #000; min-height: 18mm; }
        .qty-inner { flex: 1; display: flex; align-items: center; padding: 1px 3px; gap: 1px; flex-wrap: wrap; }
        .qty-num  { font-size: 13pt; font-weight: bold; text-decoration: underline; }
        .qty-unit { font-size: 7pt; }
        .qty-x    { font-size: 9pt; margin: 0 2px; }
        .stamp-wrap { display: flex; border-left: 1px solid #000; }
        .stamp-col  { width: 12mm; border-right: 1px solid #000; text-align: center; }
        .stamp-col:last-child { border-right: none; }
        .stamp-hd { font-size: 5.5pt; border-bottom: 1px solid #000; padding: 2px 0; background: #f0f0f0; line-height: 1.3; }
        .stamp-sp { height: 13mm; }
        .shukka-row { display: flex; border-bottom: 1px solid #000; min-height: 10mm; }
        .shukka-lbl { width: 6mm; min-width: 6mm; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 5pt; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; padding: 1px; }
        .hakoshu-row { display: flex; min-height: 10mm; }
        .biko-area { border-bottom: 1px solid #000; display: flex; min-height: 22mm; }
        .biko-left { flex: 1; padding: 2px 4px; font-size: 6pt; border-right: 1px solid #000; }
        .biko-title { font-size: 6.5pt; font-weight: bold; margin-bottom: 2px; }
        .biko-line  { margin-bottom: 2px; }
        .biko-line span { font-weight: bold; }
        .biko-input-row { font-size: 5.5pt; margin-top: 2px; }
        .biko-right { width: 16mm; min-width: 16mm; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 3px 2px; }
        .ok-stamp { width: 14mm; height: 14mm; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9pt; font-weight: bold; }
        .s-footer { text-align: center; font-size: 5.5pt; font-weight: bold; padding: 2px 0; background: #f7f7f7; }
    }

    /* ===== PDF生成中オーバーレイ ===== */
    .pdf-overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .pdf-overlay.show { display: flex; }
    .pdf-spinner { width: 52px; height: 52px; border: 5px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-overlay p { color: #fff; font-size: 16px; font-weight: 700; }
    .pdf-overlay small { color: rgba(255,255,255,0.7); font-size: 12px; }
    /* PDF描画エリア（画面外） */
    #pdfRenderArea { position: fixed; left: -9999px; top: 0; background: white; }
    </style>
</head>
<body>

<!-- ============================================================
     固定ヘッダー
============================================================ -->
<div class="ui-panel">
    <div class="panel-title">
        <span>📦</span> 指示品依頼書システム
    </div>
    <div class="panel-btns">
        <button class="btn btn-scan" onclick="openScanner()">📷 QRスキャン</button>
        <button class="btn btn-csv"  id="csvBtn"   onclick="downloadCSV()" style="display:none;">💾 CSV保存</button>
        <button class="btn btn-pdf" id="pdfBtn" onclick="generatePDF()" style="display:none;">📄 PDF出力</button>
        <button class="btn btn-clear" onclick="clearAll()">🗑 全消去</button>
    </div>
    <div class="panel-status">
        <span id="status">📷 QRスキャンボタンを押してください</span>
    </div>
</div>

<!-- ============================================================
     メインコンテンツ
============================================================ -->
<div id="mainContent">

    <!-- 空状態ガイド -->
    <div class="empty-guide" id="emptyGuide">
        <div class="icon">📋</div>
        <p>現品確認票のQRコードをスキャンすると<br>指示品依頼書が自動生成されます</p>
        <button class="btn-scan-big" onclick="openScanner()">📷 QRコードをスキャン</button>
        <p style="font-size:12px; color:#999; margin-top:8px;">
            連続スキャン対応 ／ 端数0は自動スキップ
        </p>
    </div>

    <!-- 伝票プレビューリスト（スマホ表示） -->
    <div id="slipList"></div>

    <!-- 印刷用エリア（印刷時のみ表示） -->
    <div id="printArea">
        <div class="print-wrap" id="printWrap"></div>
    </div>

</div>

<!-- PDF生成中オーバーレイ -->
<div class="pdf-overlay" id="pdfOverlay">
    <div class="pdf-spinner"></div>
    <p>PDF生成中...</p>
    <small>しばらくお待ちください</small>
</div>

<!-- PDF描画エリア（画面外） -->
<div id="pdfRenderArea"></div>

<!-- ============================================================
     カメラスキャン（フルスクリーン）
============================================================ -->
<div class="scan-modal" id="scanModal">
    <div class="scan-header">
        <h2>📷 QRコードをかざしてください</h2>
        <button class="scan-close" onclick="closeScanner()">✕ 閉じる</button>
    </div>
    <div id="qrReaderWrap">
        <div id="qrReader"></div>
        <div class="scan-overlay">
            <div class="scan-frame">
                <span></span>
                <div class="scan-line-anim"></div>
            </div>
        </div>
    </div>
    <div class="scan-footer">
        <div id="scanStatusText">スキャン待機中...</div>
    </div>
</div>

<script>
'use strict';

// ============================================================
//  QRデータ解析
//  6-13桁  : 納入日 YYYYMMDD
// 16-22桁  : 納品書No.
// 30-39桁  : 品番 (10桁)
// 42-47桁  : 収容数
// 48-52桁  : 箱種
// 53-57桁  : 納入数
// ============================================================
function parseQR(raw) {
    if (!raw || raw.length < 57) return null;
    const dateRaw   = raw.substring(5,  13);   // 6-13桁:  納入日
    const slipNo    = raw.substring(15, 22).trim(); // 16-22桁: 納品書No.
    const hinbanRaw = raw.substring(29, 39);   // 30-39桁: 品番
    const total     = parseInt(raw.substring(41, 47)) || 0; // 42-47桁: 総納入数
    const hakoshu   = raw.substring(47, 52).trim(); // 48-52桁: 箱種
    const std       = parseInt(raw.substring(52, 57)) || 0; // 53-57桁: 収容数(1箱あたり)
    const qrBoxes   = parseInt(raw.substring(59, 60)) || 0; // 60桁:    箱数

    // 整数箱・端数を分離
    const fullBoxes = (std > 0) ? Math.floor(total / std) : 0;
    const fraction  = (std > 0) ? total % std : total;

    let delivDate = '';
    if (/^\d{8}$/.test(dateRaw)) {
        delivDate = parseInt(dateRaw.slice(4,6)) + '月' + parseInt(dateRaw.slice(6,8)) + '日';
    }
    return { hinbanRaw, slipNo, delivDate, std, total, fullBoxes, fraction, hakoshu, qrBoxes };
}

// ============================================================
//  発行日
// ============================================================
const _t = new Date();
const todayStr = _t.getFullYear() + '年' + (_t.getMonth()+1) + '月' + _t.getDate() + '日';

// ============================================================
//  状態管理
// ============================================================
let items = [];   // { parsed, sid, checks }
let sidCnt = 0;

function setStatus(msg, cls='') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls;
}

function updateUI() {
    const hasItems = items.length > 0;
    document.getElementById('emptyGuide').style.display = hasItems ? 'none' : 'flex';
    document.getElementById('csvBtn').style.display     = hasItems ? 'inline-flex' : 'none';
    document.getElementById('pdfBtn').style.display   = hasItems ? 'inline-flex' : 'none';
    if (!hasItems) setStatus('📷 QRスキャンボタンを押してください');
}

// ============================================================
//  スマホ用プレビューカードを生成
// ============================================================
function addCard(item) {
    const { parsed, sid, slipTypes } = item;
    const p1 = parsed.hinbanRaw.substring(0,5);
    const p2 = parsed.hinbanRaw.substring(5);
    // 発行する伝票の説明バッジ
    const badges = slipTypes.map(t => {
        if (t.type === 'full')
            return `<span class="badge badge-full">${parsed.std}個×${t.boxes}箱</span>`;
        else
            return `<span class="badge badge-frac">${t.qty}個×1箱（端数）</span>`;
    }).join(' ');

    const card = document.createElement('div');
    card.className = 'slip-card';
    card.id = 'card-' + sid;
    card.innerHTML = `
        <div class="slip-card-header">
            <span class="slip-card-title">📄 ${p1}-${p2}　${slipTypes.length}枚発行</span>
            <button class="slip-card-del" onclick="removeItem('${sid}')">✕ 削除</button>
        </div>
        <div class="slip-card-body">
            <div class="slip-card-row">
                <span class="slip-card-lbl">品番</span>
                <span class="slip-card-val slip-card-hinban">${p1}-${p2}</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">発行内容</span>
                <span class="slip-card-val" style="font-size:11px;">${badges}</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">合計数量</span>
                <span class="slip-card-val big">${parsed.total} 個</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">顧客納入日</span>
                <span class="slip-card-val">${parsed.delivDate || '―'}</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">納品書番号</span>
                <span class="slip-card-val">${parsed.slipNo || '―'}</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">箱種</span>
                <span class="slip-card-val">${parsed.hakoshu || '―'}</span>
            </div>
            <div class="slip-card-row">
                <span class="slip-card-lbl">発行日</span>
                <span class="slip-card-val">${todayStr}</span>
            </div>
        </div>
    `;
    document.getElementById('slipList').appendChild(card);
}

// ============================================================
//  印刷用伝票HTML生成
// ============================================================
function buildHinban(raw10, sid) {
    const p1 = raw10.substring(0,5).split(''); while(p1.length<5) p1.push('');
    const p2 = raw10.substring(5,10).split(''); while(p2.length<5) p2.push('');
    function chkRow(cls, rid) {
        return `<div class="${cls}">` +
            p1.map((_,i)=>`<div class="hd"><span class="chk" onclick="toggleChk(this)" data-id="${sid}-${rid}-${i}">○</span></div>`).join('') +
            `<div class="hd sep"></div>` +
            p2.map((_,i)=>`<div class="hd"><span class="chk" onclick="toggleChk(this)" data-id="${sid}-${rid}-${5+i}">○</span></div>`).join('') +
            `</div>`;
    }
    const vr = `<div class="val-row">` +
        p1.map(c=>`<div class="hv">${c}</div>`).join('') +
        `<div class="hv sep">―</div>` +
        p2.map(c=>`<div class="hv">${c}</div>`).join('') +
        `</div>`;
    return { chk1:chkRow('check-row','r1'), val:vr, chk2:chkRow('check-row','r2'), chk3:chkRow('check-row','r3') };
}

function toggleChk(el) {
    el.classList.toggle('on');
    el.textContent = el.classList.contains('on') ? '✓' : '○';
}

// ============================================================
//  データ追加・削除
// ============================================================
function processQRData(raw) {
    const parsed = parseQR(raw);
    if (!parsed) {
        setStatus('⚠️ QRデータの形式が正しくありません', 'error');
        return false;
    }

    const p1 = parsed.hinbanRaw.substring(0,5);
    const p2 = parsed.hinbanRaw.substring(5);

    // 発行する伝票の種類を決定
    // slipTypes = [{type:'full', qty:200, boxes:2}, {type:'frac', qty:50, boxes:1}]
    const slipTypes = [];
    if (parsed.fullBoxes > 0) {
        slipTypes.push({ type: 'full', qty: parsed.std,      boxes: parsed.fullBoxes, label: '整数箱' });
    }
    if (parsed.fraction > 0) {
        slipTypes.push({ type: 'frac', qty: parsed.fraction, boxes: 1,                label: '端数箱' });
    }
    if (slipTypes.length === 0) {
        setStatus(`⚠️ ${p1}-${p2} は数量0のためスキップ`, 'info');
        return true;
    }

    const sid = 's' + (sidCnt++);
    // 伝票が1種類だけならラベル不要、2種類ならラベル付き
    const needLabel = slipTypes.length > 1;
    const item = { parsed, sid, slipTypes };
    items.push(item);

    // プレビューカード追加（1グループ = 1カード）
    addCard(item);

    // 印刷用伝票追加（種類ごとに1枚）
    const printWrap = document.getElementById('printWrap');
    slipTypes.forEach((t, i) => {
        const slipSid = sid + '_' + i;
        const label = needLabel ? t.label : '';
        printWrap.insertAdjacentHTML('beforeend', buildSlipHTML(parsed, slipSid, t.qty, t.boxes, label));
    });

    const totalSlips = document.querySelectorAll('.slip').length;
    const desc = slipTypes.map(t => t.type==='full'
        ? `${t.qty}個×${t.boxes}箱`
        : `端数${t.qty}個`).join('＋');
    setStatus(`✅ ${p1}-${p2}（${desc}）追加　印刷${totalSlips}枚`, 'ok');
    updateUI();
    return true;
}

function removeItem(sid) {
    items = items.filter(it => it.sid !== sid);
    // プレビューカード削除
    const card = document.getElementById('card-' + sid);
    if (card) card.remove();
    // 印刷用伝票削除（sid_0, sid_1 など前方一致で全削除）
    const printWrap = document.getElementById('printWrap');
    printWrap.querySelectorAll('.slip').forEach(s => {
        const dsid = s.getAttribute('data-sid') || '';
        if (dsid === sid || dsid.startsWith(sid + '_')) s.remove();
    });
    updateUI();
    if (items.length === 0) setStatus('📷 QRスキャンボタンを押してください');
    else {
        const totalSlips = document.querySelectorAll('.slip').length;
        setStatus(`伝票グループ ${items.length}件　印刷${totalSlips}枚`, 'ok');
    }
}

function clearAll() {
    items = [];
    document.getElementById('slipList').innerHTML = '';
    document.getElementById('printWrap').innerHTML = '';
    document.getElementById('csvBtn').style.display   = 'none';
    document.getElementById('pdfBtn').style.display = 'none';
    updateUI();
}

// ============================================================
//  カメラスキャン（html5-qrcode）
// ============================================================
let qrScanner = null;
let lastScanText = '';   // 直前に読み取ったQRテキスト
let lastScanTime = 0;    // 直前の読み取り時刻

async function openScanner() {
    document.getElementById('scanModal').classList.add('show');
    document.getElementById('scanStatusText').textContent = 'カメラ起動中...';

    try {
        qrScanner = new Html5Qrcode('qrReader');
        await qrScanner.start(
            { facingMode: 'environment' },
            { fps: 15, qrbox: { width: 240, height: 240 } },
            (text) => {
                const now = Date.now();
                // 【同一QRコード】は3秒以内の重複読み取りを防止
                // 【異なるQRコード】は即時受付（連続スキャン対応）
                if (text === lastScanText && now - lastScanTime < 3000) return;
                lastScanText = text;
                lastScanTime = now;
                playBeep();
                const ok = processQRData(text);
                if (ok) {
                    document.getElementById('scanStatusText').textContent = '✅ 読み取り完了！次のQRをかざしてください';
                    // フラッシュ演出
                    document.getElementById('qrReaderWrap').style.background = '#fff';
                    setTimeout(()=>{ document.getElementById('qrReaderWrap').style.background = ''; }, 150);
                }
            },
            () => {} // フレームごとの失敗は無視
        );
        document.getElementById('scanStatusText').textContent = 'QRコードをかざしてください';
    } catch(err) {
        let msg = 'カメラエラー: ' + err.message;
        if (err.message && err.message.includes('Permission')) {
            msg = '⚠️ カメラの使用を許可してください（ブラウザ設定）';
        } else if (location.protocol === 'file:') {
            msg = '⚠️ ローカルファイルではカメラが使用できません。httpsまたはlocalhostで開いてください。';
        }
        document.getElementById('scanStatusText').textContent = msg;
    }
}

function closeScanner() {
    if (qrScanner) {
        qrScanner.stop().catch(()=>{}).finally(()=>{
            qrScanner.clear();
            qrScanner = null;
            document.getElementById('qrReader').innerHTML = '';
        });
    }
    document.getElementById('scanModal').classList.remove('show');
}

// ============================================================
//  CSV出力
//  列順: 発行日,品番,種別,数量(個),箱数,収容数,顧客納入日,納品書番号,箱種,合計数量
// ============================================================
function downloadCSV() {
    if (items.length === 0) return;

    const BOM = '\uFEFF'; // Excel用BOM(文字化け防止)
    const headers = ['発行日','品番','種別','数量(個)','箱数','収容数','顧客納入日','納品書番号','箱種','合計数量'];

    const rows = [];
    rows.push(headers.join(','));

    items.forEach(item => {
        const { parsed, slipTypes } = item;
        const p1 = parsed.hinbanRaw.substring(0,5);
        const p2 = parsed.hinbanRaw.substring(5);
        const hinban = p1 + '-' + p2;

        slipTypes.forEach(t => {
            const row = [
                todayStr,
                hinban,
                t.type === 'full' ? '整数箱' : '端数箱',
                t.qty,
                t.boxes,
                parsed.std,
                parsed.delivDate || '',
                parsed.slipNo    || '',
                parsed.hakoshu   || '',
                parsed.total
            ];
            // カンマを含む値はダブルクォートで囲む
            rows.push(row.map(v => {
                const s = String(v);
                return s.includes(',') ? '"' + s + '"' : s;
            }).join(','));
        });
    });

    const csv  = BOM + rows.join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');

    // ファイル名: 指示品依頼_YYYYMMDD_HHMM.csv
    const now  = new Date();
    const fname = '指示品依頼_'
        + now.getFullYear()
        + String(now.getMonth()+1).padStart(2,'0')
        + String(now.getDate()).padStart(2,'0')
        + '_'
        + String(now.getHours()).padStart(2,'0')
        + String(now.getMinutes()).padStart(2,'0')
        + '.csv';

    a.href     = url;
    a.download = fname;
    a.click();
    URL.revokeObjectURL(url);

    setStatus('✅ CSV保存完了：' + fname + '（' + rows.length - 1 + '行）', 'ok');
}


// ============================================================
//  PDF生成（html2canvas → jsPDF）
//  A4縦に2枚配置
// ============================================================
async function generatePDF() {
    if (!items.length) return;
    document.getElementById('pdfOverlay').classList.add('show');

    try {
        // 全伝票を展開
        const allSlips = [];
        items.forEach(item => {
            item.slipTypes.forEach(t => {
                const needLabel = item.slipTypes.length > 1;
                allSlips.push({
                    parsed:    item.parsed,
                    sid:       item.sid,
                    qty:       t.qty,
                    boxes:     t.boxes,
                    slipLabel: needLabel ? t.label : '',
                });
            });
        });

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
        const MARGIN_H = 15;   // mm
        const MARGIN_V = 8;    // mm
        const GAP      = 4;    // mm
        const FORM_W   = 180;  // mm
        const FORM_H   = 134.5;// mm（A4の印刷可能領域の半分）
        const renderArea = document.getElementById('pdfRenderArea');

        for (let i = 0; i < allSlips.length; i++) {
            if (i > 0 && i % 2 === 0) doc.addPage();

            const slip = allSlips[i];
            // slip要素のHTMLを取得してレンダリング
            const slipEl = document.querySelector(`[data-sid="${slip.sid}_${i % 2}"]`)
                        || document.querySelector(`.slip[data-sid]`);

            // buildSlipHTMLで新しいHTML要素を作成
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'width:680px;background:white;display:block;';
            // slip.sli のIDで探す
            const existingSlip = document.querySelector(`.slip`);
            // 直接HTMLを生成
            wrapper.innerHTML = buildSlipHTML(
                slip.parsed,
                slip.sid + '_r' + i,
                slip.qty,
                slip.boxes,
                slip.slipLabel
            );

            renderArea.innerHTML = '';
            renderArea.appendChild(wrapper);
            await new Promise(r => setTimeout(r, 120));

            const canvas = await html2canvas(wrapper, {
                scale: 3,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                logging: false,
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const yPos = MARGIN_V + (i % 2) * (FORM_H + GAP);
            doc.addImage(imgData, 'JPEG', MARGIN_H, yPos, FORM_W, FORM_H);
        }

        renderArea.innerHTML = '';

        const now = new Date();
        const fname = '指示品依頼書_'
            + now.getFullYear()
            + String(now.getMonth()+1).padStart(2,'0')
            + String(now.getDate()).padStart(2,'0')
            + '_'
            + String(now.getHours()).padStart(2,'0')
            + String(now.getMinutes()).padStart(2,'0')
            + '.pdf';
        doc.save(fname);
        setStatus(`✅ PDF保存完了：${fname}（${allSlips.length}枚）`, 'ok');

    } catch(e) {
        console.error(e);
        setStatus('❌ PDF生成エラー: ' + e.message, 'error');
    } finally {
        document.getElementById('pdfOverlay').classList.remove('show');
    }
}

function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 1000;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
}

// スワイプで閉じる（スマホ対応）
let touchStartY = 0;
document.getElementById('scanModal').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.getElementById('scanModal').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 80) closeScanner();
});

// 初期化
updateUI();
</script>
