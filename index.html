<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a4a8a">
    <title>指示品依頼書</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: "Hiragino Kaku Gothic ProN","Meiryo","Yu Gothic",sans-serif;
        background: #eef1f6; -webkit-text-size-adjust: 100%; overscroll-behavior: none;
    }

    /* ===== 操作パネル ===== */
    .ui-panel {
        position: fixed; top: 0; left: 0; right: 0; z-index: 300;
        background: #1a4a8a; padding: env(safe-area-inset-top,0) 0 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .panel-title { color: #fff; font-size: 14px; font-weight: 700; padding: 10px 16px 4px; display: flex; align-items: center; gap: 8px; }
    .panel-btns { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .panel-btns::-webkit-scrollbar { display: none; }
    .btn {
        flex-shrink: 0; border: none; border-radius: 8px; padding: 10px 16px;
        font-size: 14px; font-weight: 700; cursor: pointer; color: #fff;
        display: flex; align-items: center; gap: 6px;
        -webkit-tap-highlight-color: transparent; touch-action: manipulation; white-space: nowrap;
    }
    .btn-scan  { background: #f57c00; font-size: 15px; padding: 12px 20px; }
    .btn-pdf   { background: #1b5e20; display: none; }
    .btn-clear { background: #546e7a; }
    .btn:active { filter: brightness(0.85); }
    .panel-status { padding: 6px 12px 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom,0)); }
    #status {
        display: block; font-size: 12px; font-weight: 600;
        padding: 6px 10px; border-radius: 6px;
        background: rgba(255,255,255,0.15); color: #fff; min-height: 30px; line-height: 1.4;
    }
    #status.error { background: #b71c1c; }
    #status.info  { background: #01579b; }
    #status.ok    { background: #1b5e20; }

    /* ===== コンテンツ ===== */
    #mainContent { padding-top: 145px; padding-bottom: calc(20px + env(safe-area-inset-bottom,0)); }
    .empty-guide {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px; min-height: 60vh; padding: 40px 24px; text-align: center;
    }
    .empty-guide .icon { font-size: 64px; opacity: 0.4; }
    .empty-guide p { font-size: 14px; color: #666; line-height: 1.6; }
    .btn-scan-big {
        background: #f57c00; color: #fff; border: none; border-radius: 50px; padding: 18px 40px;
        font-size: 18px; font-weight: 700; cursor: pointer;
        box-shadow: 0 4px 16px rgba(245,124,0,0.4); touch-action: manipulation;
    }
    .btn-scan-big:active { transform: scale(0.97); }

    /* ===== 伝票カード ===== */
    #slipList { display: flex; flex-direction: column; gap: 12px; padding: 12px 10px; }
    .slip-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); overflow: hidden; }
    .slip-card-header { background: #1a4a8a; color: #fff; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; }
    .slip-card-title { font-size: 13px; font-weight: 700; }
    .slip-card-del { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; }
    .slip-card-body { padding: 10px 12px; }
    .slip-card-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .slip-card-row:last-child { border-bottom: none; }
    .slip-card-lbl { color: #666; font-size: 11px; min-width: 70px; }
    .slip-card-val { font-weight: 700; text-align: right; }
    .slip-card-val.big { font-size: 20px; color: #c62828; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin: 1px; }
    .badge-full { background: #1565c0; color: #fff; }
    .badge-frac { background: #e65100; color: #fff; }

    /* ===== カメラモーダル ===== */
    .scan-modal { display: none; position: fixed; inset: 0; z-index: 500; background: #000; flex-direction: column; }
    .scan-modal.show { display: flex; }
    .scan-header { padding: calc(env(safe-area-inset-top,12px) + 8px) 16px 8px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); z-index: 10; }
    .scan-header h2 { color: #fff; font-size: 15px; }
    .scan-close { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }
    #qrReaderWrap { flex: 1; position: relative; overflow: hidden; }
    #qrReader { width: 100%; height: 100%; }
    #qrReader video { width:100%!important; height:100%!important; object-fit:cover!important; }
    .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    .scan-frame { width: min(70vw,260px); height: min(70vw,260px); position: relative; }
    .scan-frame::before,.scan-frame::after,.scan-frame>span::before,.scan-frame>span::after { content:''; position:absolute; width:28px; height:28px; border-color:#f57c00; border-style:solid; }
    .scan-frame::before  { top:0;left:0;  border-width:4px 0 0 4px; }
    .scan-frame::after   { top:0;right:0; border-width:4px 4px 0 0; }
    .scan-frame>span::before { bottom:0;left:0;  border-width:0 0 4px 4px; }
    .scan-frame>span::after  { bottom:0;right:0; border-width:0 4px 4px 0; }
    .scan-line-anim { position:absolute; left:4px; right:4px; height:2px; background:rgba(245,124,0,0.9); animation:scanMove 2s ease-in-out infinite; }
    @keyframes scanMove { 0%{top:4px} 50%{top:calc(100% - 6px)} 100%{top:4px} }
    .scan-footer { padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom,0)); background: rgba(0,0,0,0.6); text-align: center; }
    #scanStatusText { color:#fff; font-size:13px; }

    /* ===== PDF生成中オーバーレイ ===== */
    .pdf-overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .pdf-overlay.show { display: flex; }
    .pdf-spinner { width: 52px; height: 52px; border: 5px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-overlay p { color: #fff; font-size: 16px; font-weight: 700; }
    .pdf-overlay small { color: rgba(255,255,255,0.7); font-size: 12px; }

    /* ===== PDF描画エリア（画面外） ===== */
    #pdfRenderArea { position: fixed; left: -9999px; top: 0; background: white; }

    /* ===== 指示品依頼書フォームCSS（PDF用） =====
       Excelフォーム完全一致
       A4横幅180mm に全1095ptをスケール → 1pt = 0.1644mm
       行高さも同比率でスケール（401.25pt → 138.5mm, 係数0.34517mm/pt）
    */
    .slip-form {
        width: 180mm; height: 138.5mm;
        font-family: "MS UI Gothic","Meiryo","Hiragino Kaku Gothic ProN",sans-serif;
        background: white; overflow: hidden; position: relative;
    }
    .sf-tbl { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
    .sf-tbl td { padding: 0; overflow: hidden; vertical-align: middle; text-align: center; line-height: 1; }

    /* 列幅 */
    .cA{width:2.22mm} .cB{width:11.84mm} .cC{width:0.99mm} .cD{width:4.32mm}
    .cE,.cF,.cG,.cH,.cI,.cJ,.cK,.cL,.cM,.cN,.cO{width:11.84mm}
    .cP{width:6.78mm} .cQ,.cR{width:11.84mm}

    /* 行高さ */
    .r1,.r2,.r3,.r4,.r5,.r6{height:4.66mm}
    .r7{height:6.73mm} .r8{height:7.25mm} .r9{height:12.69mm}
    .r10{height:7.25mm} .r11{height:7.25mm} .r12{height:13.46mm}
    .r13{height:5.18mm} .r14{height:9.58mm} .r15{height:13.46mm}
    .r16{height:13.46mm} .r17,.r18{height:4.66mm} .r19{height:4.92mm}

    /* ボーダー */
    .bt{border-top:.22mm solid #000}   .bb{border-bottom:.22mm solid #000}
    .bl{border-left:.22mm solid #000}  .br{border-right:.22mm solid #000}
    .btM{border-top:.45mm solid #000}  .bbM{border-bottom:.45mm solid #000}
    .blM{border-left:.45mm solid #000} .brM{border-right:.45mm solid #000}

    /* テキストサイズ */
    .fT{font-size:5.0mm;font-weight:bold;letter-spacing:.5mm}
    .fL{font-size:3.4mm}  .fL2{font-size:2.8mm}
    .fH{font-size:4.4mm;font-weight:bold}
    .fN{font-size:5.2mm;font-weight:bold}
    .fO{font-size:3.3mm}  .fS{font-size:2.0mm}  .fB{font-size:2.2mm}
    .fFt{font-size:3.0mm;font-weight:bold}
    .taL{text-align:left;padding-left:.8mm} .vaT{vertical-align:top;padding-top:.5mm}
    .nw{white-space:nowrap;overflow:hidden} .ul{text-decoration:underline}
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="panel-title"><span>📦</span> 指示品依頼書システム</div>
    <div class="panel-btns">
        <button class="btn btn-scan" onclick="openScanner()">📷 QRスキャン</button>
        <button class="btn btn-pdf" id="pdfBtn" onclick="generatePDF()">📄 PDF出力</button>
        <button class="btn btn-clear" onclick="clearAll()">🗑 全消去</button>
    </div>
    <div class="panel-status"><span id="status">📷 QRスキャンボタンを押してください</span></div>
</div>

<div id="mainContent">
    <div class="empty-guide" id="emptyGuide">
        <div class="icon">📋</div>
        <p>現品確認票のQRコードをスキャンすると<br>指示品依頼書が自動生成されます</p>
        <button class="btn-scan-big" onclick="openScanner()">📷 QRコードをスキャン</button>
        <p style="font-size:12px;color:#999;margin-top:8px;">連続スキャン対応 ／ 端数0は自動スキップ</p>
    </div>
    <div id="slipList"></div>
</div>

<div class="scan-modal" id="scanModal">
    <div class="scan-header">
        <h2>📷 QRコードをかざしてください</h2>
        <button class="scan-close" onclick="closeScanner()">✕ 閉じる</button>
    </div>
    <div id="qrReaderWrap">
        <div id="qrReader"></div>
        <div class="scan-overlay"><div class="scan-frame"><span></span><div class="scan-line-anim"></div></div></div>
    </div>
    <div class="scan-footer"><div id="scanStatusText">スキャン待機中...</div></div>
</div>

<div class="pdf-overlay" id="pdfOverlay">
    <div class="pdf-spinner"></div>
    <p>PDF生成中...</p>
    <small>しばらくお待ちください</small>
</div>

<div id="pdfRenderArea"></div>

<script>
'use strict';

// ── QRデータ解析 ──
function parseQR(raw) {
    if (!raw || raw.length < 57) return null;
    const dateRaw   = raw.substring(5,  13);
    const slipNo    = raw.substring(15, 22).trim();
    const hinbanRaw = raw.substring(29, 39);
    const total     = parseInt(raw.substring(41, 47)) || 0;
    const hakoshu   = raw.substring(47, 52).trim();
    const std       = parseInt(raw.substring(52, 57)) || 0;
    const fullBoxes = std > 0 ? Math.floor(total / std) : 0;
    const fraction  = std > 0 ? total % std : total;
    let delivDate = '';
    if (/^\d{8}$/.test(dateRaw))
        delivDate = parseInt(dateRaw.slice(4,6)) + '月' + parseInt(dateRaw.slice(6,8)) + '日';
    return { hinbanRaw, slipNo, delivDate, std, total, fullBoxes, fraction, hakoshu };
}

const _now = new Date();
const todayStr = _now.getFullYear()+'年'+(_now.getMonth()+1)+'月'+_now.getDate()+'日';
let items = [], sidCnt = 0;

function setStatus(msg, cls='') { const e=document.getElementById('status'); e.textContent=msg; e.className=cls; }
function updateUI() {
    const has = items.length > 0;
    document.getElementById('emptyGuide').style.display = has ? 'none' : 'flex';
    document.getElementById('pdfBtn').style.display     = has ? 'inline-flex' : 'none';
    if (!has) setStatus('📷 QRスキャンボタンを押してください');
}

function addCard(item) {
    const {parsed,sid,slipTypes} = item;
    const p1=parsed.hinbanRaw.substring(0,5), p2=parsed.hinbanRaw.substring(5);
    const badges = slipTypes.map(t=>
        t.type==='full'
            ? `<span class="badge badge-full">${parsed.std}個×${t.boxes}箱</span>`
            : `<span class="badge badge-frac">${t.qty}個×1箱（端数）</span>`
    ).join(' ');
    const card = document.createElement('div');
    card.className='slip-card'; card.id='card-'+sid;
    card.innerHTML=`
        <div class="slip-card-header">
            <span class="slip-card-title">📄 ${p1}-${p2}　${slipTypes.length}枚発行</span>
            <button class="slip-card-del" onclick="removeItem('${sid}')">✕ 削除</button>
        </div>
        <div class="slip-card-body">
            <div class="slip-card-row"><span class="slip-card-lbl">品番</span><span class="slip-card-val" style="font-family:monospace;font-size:15px;">${p1}-${p2}</span></div>
            <div class="slip-card-row"><span class="slip-card-lbl">発行内容</span><span class="slip-card-val">${badges}</span></div>
            <div class="slip-card-row"><span class="slip-card-lbl">合計数量</span><span class="slip-card-val big">${parsed.total} 個</span></div>
            <div class="slip-card-row"><span class="slip-card-lbl">顧客納入日</span><span class="slip-card-val">${parsed.delivDate||'―'}</span></div>
            <div class="slip-card-row"><span class="slip-card-lbl">納品書番号</span><span class="slip-card-val">${parsed.slipNo||'―'}</span></div>
            <div class="slip-card-row"><span class="slip-card-lbl">箱種</span><span class="slip-card-val">${parsed.hakoshu||'―'}</span></div>
        </div>`;
    document.getElementById('slipList').appendChild(card);
}

function processQRData(raw) {
    const parsed = parseQR(raw);
    if (!parsed) { setStatus('⚠️ QRデータの形式が正しくありません','error'); return false; }
    const p1=parsed.hinbanRaw.substring(0,5), p2=parsed.hinbanRaw.substring(5);
    const slipTypes=[];
    if (parsed.fullBoxes>0) slipTypes.push({type:'full',qty:parsed.std,      boxes:parsed.fullBoxes,label:'整数箱'});
    if (parsed.fraction >0) slipTypes.push({type:'frac',qty:parsed.fraction, boxes:1,               label:'端数箱'});
    if (!slipTypes.length) { setStatus(`ℹ️ ${p1}-${p2} は数量0のためスキップ`,'info'); return true; }
    const sid='s'+(sidCnt++), item={parsed,sid,slipTypes};
    items.push(item); addCard(item);
    const desc=slipTypes.map(t=>t.type==='full'?`${t.qty}個×${t.boxes}箱`:`端数${t.qty}個`).join('＋');
    setStatus(`✅ ${p1}-${p2}（${desc}）追加　計${items.length}件`,'ok');
    updateUI(); return true;
}

function removeItem(sid) {
    items=items.filter(it=>it.sid!==sid);
    const c=document.getElementById('card-'+sid); if(c) c.remove();
    updateUI(); if(items.length) setStatus(`伝票 ${items.length}件`,'ok');
}
function clearAll() {
    items=[]; document.getElementById('slipList').innerHTML='';
    document.getElementById('pdfBtn').style.display='none'; updateUI();
}

// ── フォームHTML生成（Excelフォーム完全一致） ──
function buildSlipHTML(d) {
    const h=(d.hinban||'').replace(/-/g,'').replace(/\s/g,'');
    const p1=(h.substring(0,5)+'     ').substring(0,5).split('');
    const p2=(h.substring(5,10)+'     ').substring(0,5).split('');
    const qty=d.qty||'', boxes=d.boxes||'';
    const date_s=d.date||'', deliv=d.deliv||'', slipno=d.slipno||'';
    const hakoshu=d.hakoshu||'', label=d.label||'';
    const title='指示品依頼書'+(label?`【${label}】`:'');

    // 品番セル生成
    const hCols=['cD','cE','cF','cG','cH'], hCols2=['cJ','cK','cL','cM','cN'];
    const mkHinban=(arr,cols,row)=>arr.map((ch,i)=>`<td class="${cols[i]} bt bb bl br ${row} fH">${ch}</td>`).join('');
    const mkCircle=(cols,row)=>cols.map(c=>`<td class="${c} fO ${row}">○</td>`).join('');

    return `<div class="slip-form">
<table class="sf-tbl">
<colgroup><col class="cA"><col class="cB"><col class="cC">
<col class="cD"><col class="cE"><col class="cF"><col class="cG"><col class="cH">
<col class="cI"><col class="cJ"><col class="cK"><col class="cL">
<col class="cM"><col class="cN"><col class="cO"><col class="cP">
<col class="cQ"><col class="cR"></colgroup>
<tbody>
<tr class="r1">
  <td class="cA"></td>
  <td colspan="13" class="btM blM r1 fT" style="height:27.96mm;" rowspan="6">${title}</td>
  <td colspan="4" class="btM brM" rowspan="6"></td>
</tr>
<tr class="r2"></tr><tr class="r3"></tr><tr class="r4"></tr><tr class="r5"></tr>
<tr class="r6"><td class="cA bb"></td></tr>
<tr class="r7">
  <td class="cA blM"></td><td class="cB blM"></td><td colspan="12"></td>
  <td colspan="4" class="bt brM"></td>
</tr>
<tr class="r8">
  <td class="cA blM"></td>
  <td class="cB bt bb blM br fL" rowspan="4" style="height:34.44mm;">
    <div style="font-size:3.5mm;font-weight:bold;text-align:center;line-height:1.5">品<br>番</div>
  </td>
  <td class="cC bl"></td>
  ${mkCircle(hCols,'r8')}
  <td class="cI r8 fO"></td>
  ${mkCircle(hCols2,'r8')}
  <td colspan="4" class="brM fS taL nw">←かんばんから転記時に確認。</td>
</tr>
<tr class="r9">
  <td class="cA blM"></td>
  <td class="cC bl"></td>
  ${mkHinban(p1,hCols,'r9')}
  <td class="cI r9 fH">―</td>
  ${mkHinban(p2,hCols2,'r9')}
  <td colspan="4" class="brM"></td>
</tr>
<tr class="r10">
  <td class="cA blM"></td><td class="cC bl"></td>
  ${mkCircle(hCols,'r10')}
  <td class="cI r10 fO"></td>
  ${mkCircle(hCols2,'r10')}
  <td colspan="4" class="brM fS taL nw">←見本準備時に作業者が確認。</td>
</tr>
<tr class="r11">
  <td class="cA blM"></td><td class="cC bl bb"></td>
  ${mkCircle(hCols,'r11')}
  <td class="cI r11 fO"></td>
  ${mkCircle(hCols2,'r11')}
  <td colspan="4" class="brM fS taL nw">←次工程へ渡し時に監督者が確認。</td>
</tr>
<tr class="r12">
  <td class="cA"></td>
  <td class="cB bt bb blM br fL">依頼日</td>
  <td colspan="12" class="bt bb bl br fL">${date_s}</td>
  <td colspan="4" class="bt bb bl brM vaT fB taL" rowspan="5" style="height:54.34mm;">＜備考欄＞<br>・顧客納入日：${deliv}<br>・納品書番号：${slipno}</td>
</tr>
<tr class="r13">
  <td class="cA"></td>
  <td class="cB bt blM br fL" rowspan="2" style="height:14.76mm;">
    <div style="font-size:3.4mm;font-weight:bold;text-align:center">数量</div>
  </td>
  <td colspan="9" class="bt bl"></td>
  <td class="cL bt bb bl br fS">数量<br>ﾁｪｯｸ</td>
  <td colspan="2" class="bt bb bl br fS">作業者</td>
  <td class="cO bt bb bl br fS">監督者</td>
</tr>
<tr class="r14">
  <td class="cA"></td>
  <td class="cC bl"></td>
  <td colspan="3" class="cD bb taL" style="padding-left:1mm;"><span class="fN ul">${qty}</span></td>
  <td class="cG bb fL">個</td><td class="cH bb fL">×</td>
  <td colspan="2" class="cI bb"><span class="fN">${boxes}</span></td>
  <td class="cK bb fL">箱</td>
  <td class="cL bb bl br"></td>
  <td colspan="2" class="bt bb bl br"></td>
  <td class="cO bt bb bl br"></td>
</tr>
<tr class="r15">
  <td class="cA"></td>
  <td class="cB bt bb blM br fL2" style="font-size:2.5mm;">出荷日/<br>便</td>
  <td colspan="12" class="bt bl br fS taL nw">　月　　日　　:　　まで　　森町便　　フタバ便</td>
</tr>
<tr class="r16">
  <td class="cA"></td>
  <td class="cB bt bb blM br fL">箱種</td>

</tr>

</tr>
<tr class="r18"></tr>

</tbody></table></div>`;
}

// ── PDF生成（html2canvas → jsPDF） ──
async function generatePDF() {
    if (!items.length) return;
    document.getElementById('pdfOverlay').classList.add('show');
    try {
        // 全伝票を展開
        const allSlips=[];
        items.forEach(item=>{
            item.slipTypes.forEach(t=>{
                allSlips.push({
                    hinban:  item.parsed.hinbanRaw,
                    qty:     t.qty,
                    boxes:   t.boxes,
                    date:    todayStr,
                    deliv:   item.parsed.delivDate,
                    slipno:  item.parsed.slipNo,
                    hakoshu: item.parsed.hakoshu,
                    label:   item.slipTypes.length>1 ? t.label : '',
                });
            });
        });

        const {jsPDF} = window.jspdf;
        const doc = new jsPDF({unit:'mm', format:'a4', orientation:'portrait'});
        const renderArea = document.getElementById('pdfRenderArea');

        // 2枚ずつページに分割
        for (let i=0; i<allSlips.length; i++) {
            if (i>0 && i%2===0) doc.addPage();

            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'width:180mm;background:white;position:relative;';
            wrapper.innerHTML = buildSlipHTML(allSlips[i]);
            renderArea.innerHTML = '';
            renderArea.appendChild(wrapper);

            await new Promise(r=>setTimeout(r,100));

            const canvas = await html2canvas(wrapper, {
                scale: 3,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                logging: false,
                width:  wrapper.offsetWidth,
                height: wrapper.offsetHeight,
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const yPos = 8 + (i%2) * (138.5 + 4);
            doc.addImage(imgData, 'JPEG', 15, yPos, 180, 138.5);
        }

        renderArea.innerHTML='';

        const now=new Date();
        const fname='指示品依頼書_'
            +now.getFullYear()
            +String(now.getMonth()+1).padStart(2,'0')
            +String(now.getDate()).padStart(2,'0')
            +'_'
            +String(now.getHours()).padStart(2,'0')
            +String(now.getMinutes()).padStart(2,'0')
            +'.pdf';
        doc.save(fname);
        setStatus(`✅ PDF保存完了：${fname}（${allSlips.length}枚）`,'ok');

    } catch(e) {
        console.error(e);
        setStatus('❌ PDF生成エラー: '+e.message,'error');
    } finally {
        document.getElementById('pdfOverlay').classList.remove('show');
    }
}

// ── カメラスキャン ──
let qrScanner=null, lastScanText='', lastScanTime=0;

async function openScanner() {
    document.getElementById('scanModal').classList.add('show');
    document.getElementById('scanStatusText').textContent='カメラ起動中...';
    try {
        qrScanner=new Html5Qrcode('qrReader');
        await qrScanner.start(
            {facingMode:'environment'},
            {fps:15, qrbox:{width:240,height:240}},
            (text)=>{
                const now=Date.now();
                if (text===lastScanText && now-lastScanTime<3000) return;
                lastScanText=text; lastScanTime=now;
                playBeep();
                const ok=processQRData(text);
                if (ok) {
                    document.getElementById('scanStatusText').textContent='✅ 読み取り完了！次のQRをかざしてください';
                    document.getElementById('qrReaderWrap').style.background='#fff';
                    setTimeout(()=>{document.getElementById('qrReaderWrap').style.background='';},150);
                }
            },
            ()=>{}
        );
        document.getElementById('scanStatusText').textContent='QRコードをかざしてください';
    } catch(err) {
        let msg='カメラエラー: '+err.message;
        if (location.protocol==='file:') msg='⚠️ httpsで開いてください（GitHub Pages推奨）';
        else if ((err.message||'').includes('ermission')) msg='⚠️ カメラの使用を許可してください';
        document.getElementById('scanStatusText').textContent=msg;
    }
}

function closeScanner() {
    if (qrScanner) {
        qrScanner.stop().catch(()=>{}).finally(()=>{
            qrScanner.clear(); qrScanner=null;
            document.getElementById('qrReader').innerHTML='';
        });
    }
    document.getElementById('scanModal').classList.remove('show');
}

function playBeep() {
    try {
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=1000;
        gain.gain.setValueAtTime(0.3,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
        osc.start(); osc.stop(ctx.currentTime+0.15);
    } catch(e){}
}

let touchStartY=0;
document.getElementById('scanModal').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;});
document.getElementById('scanModal').addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-touchStartY>80) closeScanner();
});

updateUI();
</script>
