<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指示品依頼書システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Meiryo', 'MS Gothic', sans-serif; background: #f0f0f0; }

/* ===== アプリUI ===== */
#app { max-width: 500px; margin: 0 auto; padding: 16px; }
h1 { font-size: 20px; text-align: center; margin-bottom: 16px; color: #333; }
.btn {
  display: block; width: 100%; padding: 14px;
  font-size: 18px; font-weight: bold;
  border: none; border-radius: 8px; cursor: pointer; margin-bottom: 12px;
}
.btn-scan { background: #1a73e8; color: #fff; }
.btn-pdf  { background: #e53935; color: #fff; }
.btn-clear{ background: #777;    color: #fff; font-size:14px; padding:10px; }
#status { text-align:center; color:#555; margin:8px 0; min-height:1.4em; font-size:14px; }
#slip-list { margin-top:8px; }
.slip-item {
  background:#fff; border:1px solid #ccc; border-radius:6px;
  padding:8px 12px; margin-bottom:6px; font-size:13px; color:#333;
}
.slip-item span { font-weight:bold; color:#1a73e8; }

/* ===== カメラUI ===== */
#scanner-overlay {
  display:none; position:fixed; inset:0; background:#000; z-index:100;
  flex-direction:column; align-items:center; justify-content:center;
}
#scanner-overlay.active { display:flex; }
#video { width:100%; max-width:500px; }
#scan-frame {
  position:absolute; width:70vw; max-width:300px; height:70vw; max-height:300px;
  border:3px solid #0f0; border-radius:8px; box-shadow:0 0 0 9999px rgba(0,0,0,.5);
}
#btn-close-scan {
  position:absolute; top:20px; right:20px;
  background:rgba(255,255,255,.2); color:#fff;
  border:2px solid #fff; border-radius:50%;
  width:44px; height:44px; font-size:22px; cursor:pointer;
}

/* ===== 伝票プレビュー（非表示・PDF生成用） ===== */
#pdf-container {
  position:fixed; left:-9999px; top:0;
  width:257mm; /* A4横 */
  background:#fff;
  padding: 8mm;
}

/* ===== 伝票本体（横長） ===== */
/*
  写真のフォームサイズ参考：
  横 約190mm、縦 約140mm（B5横相当・A4に2枚並べ）
  → A4横(297mm)に1枚/ページ で出力、左右マージンで収める
  → または A4縦(297mm高)に2枚/ページ(各約128mm高)
  ここでは A4縦 に2枚/ページ 方式を維持しつつ、横幅をフルに使う
*/
.slip {
  width: 183mm;
  border: 1.5px solid #000;
  font-family: 'Meiryo', 'MS Gothic', sans-serif;
  font-size: 9pt;
  background: #fff;
  margin-bottom: 4mm;
  page-break-inside: avoid;
}

/* --- ヘッダー行（タイトル + 工程フロー） --- */
.slip-header {
  display: flex;
  border-bottom: 1.5px solid #000;
}
.slip-title-cell {
  width: 38mm;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14pt;
  font-weight: bold;
  border-right: 1.5px solid #000;
  padding: 2mm 1mm;
}
.slip-flow-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.flow-labels {
  display: flex;
  border-bottom: 1px solid #000;
}
.flow-label {
  flex: 1;
  text-align: center;
  font-size: 7pt;
  padding: 1mm 0;
  border-right: 1px solid #000;
}
.flow-label:last-child { border-right: none; }
.flow-arrows {
  display: flex;
  padding: 1.5mm 2mm;
  align-items: center;
  gap: 2mm;
}
.flow-arrow {
  flex: 1;
  text-align: center;
  font-size: 14pt;
  color: #555;
  line-height: 1;
}

/* --- 品番エリア --- */
.slip-hanban {
  display: flex;
  border-bottom: 1px solid #000;
}
.label-cell {
  width: 10mm;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8pt;
  font-weight: bold;
  border-right: 1.5px solid #000;
  writing-mode: vertical-rl;
  padding: 1mm 0;
  letter-spacing: 1px;
}
.hanban-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.check-row {
  display: flex;
  align-items: center;
  padding: 0.5mm 2mm;
  gap: 1mm;
  border-bottom: 1px solid #ccc;
  min-height: 7mm;
}
.check-row:last-child { border-bottom: none; }
.check-circle {
  width: 5mm; height: 5mm;
  border: 1px solid #000; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}
.check-note {
  font-size: 7pt;
  color: #333;
  margin-left: 1mm;
}
.digit-row {
  display: flex;
  align-items: center;
  padding: 0.5mm 2mm;
  gap: 0;
  min-height: 8mm;
  border-bottom: 1px solid #ccc;
}
.digit-box {
  width: 7mm; height: 7mm;
  border: 1px solid #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 11pt; font-weight: bold;
}
.digit-sep {
  font-size: 12pt; font-weight: bold;
  padding: 0 1mm;
}

/* --- 依頼日行 --- */
.slip-irai-row {
  display: flex;
  border-top: 1.5px solid #000;
  border-bottom: 1px solid #000;
}
.irai-label {
  width: 10mm;
  font-size: 8pt; font-weight: bold;
  border-right: 1.5px solid #000;
  display: flex; align-items: center; justify-content: center;
  writing-mode: vertical-rl;
  padding: 1mm 0;
}
.irai-date {
  flex: 1;
  display: flex; align-items: center;
  padding: 1mm 3mm;
  font-size: 10pt;
  min-height: 9mm;
  border-right: 1px solid #000;
}
.biko-cell {
  width: 40mm;
  font-size: 7pt;
  padding: 1mm 2mm;
}
.biko-title { font-weight: bold; margin-bottom: 0.5mm; }
.biko-body { font-size: 6.5pt; line-height: 1.4; }

/* --- 数量行 --- */
.slip-qty-row {
  display: flex;
  border-bottom: 1px solid #000;
  min-height: 14mm;
}
.qty-label {
  width: 10mm;
  font-size: 8pt; font-weight: bold;
  border-right: 1.5px solid #000;
  display: flex; align-items: center; justify-content: center;
  writing-mode: vertical-rl;
}
.qty-body {
  flex: 1;
  display: flex; align-items: center;
  padding: 1mm 3mm;
  font-size: 13pt; font-weight: bold;
  border-right: 1px solid #000;
}
.qty-num { text-decoration: underline; }
.qty-stamp-area {
  display: flex;
  flex-direction: column;
  width: 38mm;
}
.qty-stamp-labels {
  display: flex;
  border-bottom: 1px solid #000;
}
.stamp-label {
  flex: 1;
  text-align: center;
  font-size: 7pt;
  padding: 0.5mm 0;
  border-right: 1px solid #000;
}
.stamp-label:first-child {
  font-size: 6.5pt;
}
.stamp-label:last-child { border-right: none; }
.qty-stamp-boxes {
  display: flex;
  flex: 1;
}
.stamp-box {
  flex: 1;
  border-right: 1px solid #000;
  min-height: 9mm;
}
.stamp-box:last-child { border-right: none; }

/* --- 出荷日/便行 --- */
.slip-shipday-row {
  display: flex;
  border-bottom: 1px solid #000;
  min-height: 9mm;
}
.shipday-label {
  width: 10mm;
  font-size: 7pt; font-weight: bold;
  border-right: 1.5px solid #000;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 1mm 0;
  line-height: 1.3;
}
.shipday-body {
  flex: 1;
  display: flex; align-items: center;
  padding: 1mm 3mm;
  font-size: 9pt;
  gap: 2mm;
}
.shipday-underline {
  border-bottom: 1px solid #000;
  min-width: 6mm; display: inline-block;
}

/* --- 箱種行 --- */
.slip-hakoshu-row {
  display: flex;
  border-bottom: 1.5px solid #000;
  min-height: 9mm;
}
.hakoshu-label {
  width: 10mm;
  font-size: 8pt; font-weight: bold;
  border-right: 1.5px solid #000;
  display: flex; align-items: center; justify-content: center;
  writing-mode: vertical-rl;
}
.hakoshu-value {
  width: 20mm;
  display: flex; align-items: center;
  padding: 1mm 2mm;
  font-size: 10pt; font-weight: bold;
  border-right: 1px solid #000;
}
.rekakunin-box {
  flex: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1mm 2mm;
  border: 1px solid #000;
  margin: 1mm;
  font-size: 8.5pt;
}
.rekakunin-text {
  font-size: 8pt;
}
.rekakunin-stamp {
  display: flex; align-items: center; gap: 1mm;
}
.face-circle {
  width: 9mm; height: 9mm;
  border: 1.5px solid #000; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9pt;
}
.ok-box {
  border: 1.5px solid #000; border-radius: 3px;
  padding: 0.5mm 2mm;
  font-size: 10pt; font-weight: bold;
}

/* --- フッター --- */
.slip-footer {
  text-align: center;
  font-size: 9pt;
  font-weight: bold;
  padding: 2mm 0;
}
</style>
</head>
<body>

<!-- ===== アプリUI ===== -->
<div id="app">
  <h1>📋 指示品依頼書システム</h1>
  <button class="btn btn-scan" onclick="openScanner()">📷 QRコードをスキャン</button>
  <div id="status">スキャン待機中...</div>
  <div id="slip-list"></div>
  <button class="btn btn-pdf" onclick="generatePDF()" style="display:none" id="btn-pdf">📄 PDFを出力する</button>
  <button class="btn btn-clear" onclick="clearAll()" style="display:none" id="btn-clear">🗑️ クリア</button>
</div>

<!-- ===== カメラUI ===== -->
<div id="scanner-overlay">
  <video id="video" playsinline autoplay muted></video>
  <div id="scan-frame"></div>
  <button id="btn-close-scan" onclick="closeScanner()">✕</button>
</div>

<!-- ===== PDF生成用コンテナ（非表示） ===== -->
<div id="pdf-container"></div>

<script>
// ========== QRパース ==========
function parseQR(text) {
  try {
    const deliveryDate = text.substring(5, 13);   // 6-13桁
    const slipNo      = text.substring(15, 22);   // 16-22桁
    const partNo      = text.substring(29, 39);   // 30-39桁
    const totalQty    = parseInt(text.substring(41, 47), 10); // 42-47桁
    const boxType     = text.substring(47, 52);   // 48-52桁
    const capacity    = parseInt(text.substring(52, 57), 10); // 53-57桁
    const boxes       = parseInt(text.substring(59, 60), 10); // 60桁

    const y = deliveryDate.substring(0,4);
    const m = deliveryDate.substring(4,6);
    const d = deliveryDate.substring(6,8);
    const deliveryDateStr = `${parseInt(m)}月${parseInt(d)}日`;

    const p1 = partNo.substring(0,5);
    const p2 = partNo.substring(5,10);

    const fullBoxes = Math.floor(totalQty / capacity);
    const fraction  = totalQty % capacity;

    return { deliveryDateStr, slipNo, partNo, p1, p2, totalQty, capacity, boxes, boxType, fullBoxes, fraction };
  } catch(e) {
    return null;
  }
}

// ========== 伝票HTML生成 ==========
function buildSlipHTML(data, type) {
  // type: 'full'=整数箱, 'frac'=端数箱
  const today = new Date();
  const iraDate = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  let title = '指示品依頼書';
  let qty, boxCount;
  if (type === 'full') {
    title = '指示品依頼書【整数箱】';
    qty = data.capacity;
    boxCount = data.fullBoxes;
  } else {
    title = '指示品依頼書【端数箱】';
    qty = data.fraction;
    boxCount = 1;
  }

  const digits1 = data.p1.split('');
  const digits2 = data.p2.split('');

  return `
<div class="slip">
  <!-- ヘッダー：タイトル＋工程フロー -->
  <div class="slip-header">
    <div class="slip-title-cell">${title}</div>
    <div class="slip-flow-area">
      <div class="flow-labels">
        <div class="flow-label">依頼者</div>
        <div class="flow-label">監督者</div>
        <div class="flow-label">作業者</div>
        <div class="flow-label">監督者(品確)</div>
        <div class="flow-label">最終確認(日程G)</div>
      </div>
      <div class="flow-arrows">
        <div class="flow-arrow">➡</div>
        <div class="flow-arrow">➡</div>
        <div class="flow-arrow">➡</div>
        <div class="flow-arrow">➡</div>
      </div>
    </div>
  </div>

  <!-- 品番エリア -->
  <div class="slip-hanban">
    <div class="label-cell">品番</div>
    <div class="hanban-body">
      <!-- かんばん転記確認行 -->
      <div class="check-row">
        ${digits1.map(d=>`<div class="check-circle"></div>`).join('')}
        &nbsp;&nbsp;
        ${digits2.map(d=>`<div class="check-circle"></div>`).join('')}
        <span class="check-note">←かんばんから転記時に確認。</span>
      </div>
      <!-- 品番数字行 -->
      <div class="digit-row">
        ${digits1.map(d=>`<div class="digit-box">${d}</div>`).join('')}
        <div class="digit-sep">－</div>
        ${digits2.map(d=>`<div class="digit-box">${d}</div>`).join('')}
      </div>
      <!-- 見本準備確認行 -->
      <div class="check-row">
        ${digits1.map(d=>`<div class="check-circle"></div>`).join('')}
        &nbsp;&nbsp;
        ${digits2.map(d=>`<div class="check-circle"></div>`).join('')}
        <span class="check-note">←見本準備時に作業者が確認。</span>
      </div>
      <!-- 次工程渡し確認行 -->
      <div class="check-row" style="border-bottom:none">
        ${digits1.map(d=>`<div class="check-circle"></div>`).join('')}
        &nbsp;&nbsp;
        ${digits2.map(d=>`<div class="check-circle"></div>`).join('')}
        <span class="check-note">←次工程へ渡し時に監督者が確認。</span>
      </div>
    </div>
  </div>

  <!-- 依頼日行 -->
  <div class="slip-irai-row">
    <div class="irai-label">依頼日</div>
    <div class="irai-date">${iraDate}</div>
    <div class="biko-cell">
      <div class="biko-title">＜備考欄＞</div>
      <div class="biko-body">
        ・顧客納入日：${data.deliveryDateStr}<br>
        ・納品書番号：${data.slipNo}
      </div>
    </div>
  </div>

  <!-- 数量行 -->
  <div class="slip-qty-row">
    <div class="qty-label">数量</div>
    <div class="qty-body">
      <span class="qty-num">${qty.toLocaleString()}個</span>&nbsp;×&nbsp;${boxCount}箱
    </div>
    <div class="qty-stamp-area">
      <div class="qty-stamp-labels">
        <div class="stamp-label">数量<br>チェック</div>
        <div class="stamp-label">作業者</div>
        <div class="stamp-label">監督者</div>
      </div>
      <div class="qty-stamp-boxes">
        <div class="stamp-box"></div>
        <div class="stamp-box"></div>
        <div class="stamp-box"></div>
      </div>
    </div>
  </div>

  <!-- 出荷日/便行 -->
  <div class="slip-shipday-row">
    <div class="shipday-label">出荷日/<br>便</div>
    <div class="shipday-body">
      <span class="shipday-underline">&nbsp;&nbsp;&nbsp;</span>月
      <span class="shipday-underline">&nbsp;&nbsp;&nbsp;</span>日　:　まで
      &nbsp;森町便&nbsp;&nbsp;<u>フタバ便</u>
    </div>
  </div>

  <!-- 箱種行 -->
  <div class="slip-hakoshu-row">
    <div class="hakoshu-label">箱種</div>
    <div class="hakoshu-value">${data.boxType}</div>
    <div style="flex:1; display:flex; align-items:center; padding:1mm 2mm;">
      <div class="rekakunin-box">
        <div class="rekakunin-text">数量・指示日など、記入に間違いがないか　<strong>再・確・認</strong></div>
        <div class="rekakunin-stamp">
          <div class="face-circle">··</div>
          <div class="ok-box">OK！</div>
        </div>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <div class="slip-footer">受付者はこの依頼書を製品に付けて依頼者へ渡して下さい</div>
</div>`;
}

// ========== スリップデータ管理 ==========
let slips = [];
let lastScanText = '';
let lastScanTime = 0;

function addSlips(data) {
  const today = new Date().toLocaleDateString('ja-JP');
  if (data.fullBoxes > 0) {
    slips.push({ data, type: 'full' });
  }
  if (data.fraction > 0) {
    slips.push({ data, type: 'frac' });
  }
  renderSlipList();
  document.getElementById('btn-pdf').style.display = 'block';
  document.getElementById('btn-clear').style.display = 'block';
}

function renderSlipList() {
  const el = document.getElementById('slip-list');
  el.innerHTML = slips.map((s, i) => {
    const label = s.type === 'full' ? '整数箱' : '端数箱';
    const qty = s.type === 'full' ? s.data.capacity * s.data.fullBoxes : s.data.fraction;
    return `<div class="slip-item">${i+1}. 品番 ${s.data.p1}-${s.data.p2}　<span>${label}</span>　${qty}個</div>`;
  }).join('');
}

function clearAll() {
  slips = [];
  lastScanText = '';
  lastScanTime = 0;
  document.getElementById('slip-list').innerHTML = '';
  document.getElementById('btn-pdf').style.display = 'none';
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('status').textContent = 'クリアしました。スキャン待機中...';
}

// ========== QRスキャナー ==========
let videoStream = null;
let scanInterval = null;

function openScanner() {
  document.getElementById('scanner-overlay').classList.add('active');
  const video = document.getElementById('video');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      videoStream = stream;
      video.srcObject = stream;
      video.play();
      startScan(video);
    })
    .catch(e => {
      alert('カメラを起動できませんでした: ' + e.message);
      closeScanner();
    });
}

function closeScanner() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  document.getElementById('scanner-overlay').classList.remove('active');
}

function startScan(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  scanInterval = setInterval(() => {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let code = null;
    try { code = jsQR(imageData.data, imageData.width, imageData.height); } catch(e) {}
    if (code && code.data) {
      const now = Date.now();
      const sameQR = code.data === lastScanText;
      if (sameQR && (now - lastScanTime) < 3000) return;
      lastScanText = code.data;
      lastScanTime = now;
      const parsed = parseQR(code.data);
      if (parsed) {
        document.getElementById('status').textContent = `✅ スキャン成功: 品番 ${parsed.p1}-${parsed.p2}`;
        addSlips(parsed);
        closeScanner();
      } else {
        document.getElementById('status').textContent = '⚠️ QRデータを解析できませんでした';
      }
    }
  }, 200);
}

// ========== PDF生成 ==========
async function generatePDF() {
  if (slips.length === 0) { alert('伝票がありません'); return; }
  document.getElementById('status').textContent = 'PDF生成中...';

  const container = document.getElementById('pdf-container');
  container.innerHTML = '';

  // 伝票を2枚ずつグループ化
  const groups = [];
  for (let i = 0; i < slips.length; i += 2) {
    groups.push(slips.slice(i, i + 2));
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  for (let gi = 0; gi < groups.length; gi++) {
    const group = groups[gi];
    const page = document.createElement('div');
    page.style.cssText = 'display:flex;flex-direction:column;gap:4mm;padding:8mm;background:#fff;width:210mm;';
    group.forEach(s => {
      page.innerHTML += buildSlipHTML(s.data, s.type);
    });
    container.appendChild(page);

    await new Promise(r => setTimeout(r, 100));
    const canvas = await html2canvas(page, { scale: 3, useCORS: true, logging: false });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    if (gi > 0) pdf.addPage();
    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    container.innerHTML = '';
  }

  const now = new Date();
  const fname = `指示品依頼書_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.pdf`;
  pdf.save(fname);
  document.getElementById('status').textContent = 'PDF出力完了！';
}
</script>
