<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a4a8a">
<title>指示品依頼書</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"MS UI Gothic","Meiryo","Yu Gothic",sans-serif;background:#eef1f6;-webkit-text-size-adjust:100%;overscroll-behavior:none;}

/* ===== 操作パネル ===== */
.ui-panel{position:fixed;top:0;left:0;right:0;z-index:300;background:#1a4a8a;padding:env(safe-area-inset-top,0) 0 0;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.panel-title{color:#fff;font-size:14px;font-weight:700;padding:10px 16px 4px;display:flex;align-items:center;gap:8px;}
.panel-btns{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.panel-btns::-webkit-scrollbar{display:none;}
.btn{flex-shrink:0;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;}
.btn-scan{background:#f57c00;font-size:15px;padding:12px 20px;}
.btn-print{background:#c62828;display:none;}
.btn-clear{background:#546e7a;}
.btn:active{filter:brightness(0.85);}
.panel-status{padding:6px 12px 8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0));}
#status{display:block;font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,0.15);color:#fff;min-height:30px;line-height:1.4;}
#status.error{background:#b71c1c;}
#status.info{background:#01579b;}
#status.ok{background:#1b5e20;}

/* ===== メインコンテンツ ===== */
#mainContent{padding-top:130px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0));}
.empty-guide{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:60vh;padding:40px 24px;text-align:center;}
.empty-guide .icon{font-size:64px;opacity:0.4;}
.empty-guide p{font-size:14px;color:#666;line-height:1.6;}
.btn-scan-big{background:#f57c00;color:#fff;border:none;border-radius:50px;padding:18px 40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,124,0,0.4);-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-scan-big:active{transform:scale(0.97);}
#slipList{display:flex;flex-direction:column;gap:12px;padding:12px 10px;}
.slip-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.12);overflow:hidden;}
.slip-card-header{background:#1a4a8a;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.slip-card-title{font-size:13px;font-weight:700;}
.slip-card-del{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.slip-card-body{padding:10px 12px;}
.slip-card-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.slip-card-row:last-child{border-bottom:none;}
.slip-card-lbl{color:#666;font-size:11px;min-width:70px;}
.slip-card-val{font-weight:700;text-align:right;}
.slip-card-val.big{font-size:20px;color:#c62828;}
.slip-card-hinban{font-family:monospace;font-size:15px;letter-spacing:1px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin:1px;}
.badge-full{background:#1565c0;color:#fff;}
.badge-frac{background:#e65100;color:#fff;}

/* ===== カメラモーダル ===== */
.scan-modal{display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column;}
.scan-modal.show{display:flex;}
.scan-header{padding:calc(env(safe-area-inset-top,12px) + 8px) 16px 8px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.6);position:relative;z-index:10;}
.scan-header h2{color:#fff;font-size:15px;}
.scan-close{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#qrReaderWrap{flex:1;position:relative;overflow:hidden;}
#qrReader{width:100%;height:100%;}
#qrReader video{width:100%!important;height:100%!important;object-fit:cover!important;}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.scan-frame{width:min(70vw,260px);height:min(70vw,260px);position:relative;}
.scan-frame::before,.scan-frame::after,.scan-frame>span::before,.scan-frame>span::after{content:'';position:absolute;width:28px;height:28px;border-color:#f57c00;border-style:solid;}
.scan-frame::before{top:0;left:0;border-width:4px 0 0 4px;}
.scan-frame::after{top:0;right:0;border-width:4px 4px 0 0;}
.scan-frame>span::before{bottom:0;left:0;border-width:0 0 4px 4px;}
.scan-frame>span::after{bottom:0;right:0;border-width:0 4px 4px 0;}
.scan-line-anim{position:absolute;left:4px;right:4px;height:2px;background:rgba(245,124,0,0.9);animation:scanMove 2s ease-in-out infinite;}
@keyframes scanMove{0%{top:4px}50%{top:calc(100% - 6px)}100%{top:4px}}
.scan-footer{padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0));background:rgba(0,0,0,0.6);text-align:center;}
#scanStatusText{color:#fff;font-size:13px;}

/* ===== 印刷エリア（画面では非表示） ===== */
#printArea{display:none;}

/* ============================================================
   印刷CSS ― Excelフォームに完全一致
   ページ: A4縦, 2列×2行＝4枚/ページ

   Excelフォーム 行高さ(pt→mm×0.3528):
     行1-6:  13.5pt × 6 = 28.8mm  (タイトル B1:O6結合)
     行7:    19.5pt     =  6.9mm  (区切り行)
     行8:    21.0pt     =  7.4mm  (品番ラベル+かんばん注記+○)
     行9:    36.75pt    = 13.0mm  (品番値)
     行10:   21.0pt     =  7.4mm  (品番○見本準備)
     行11:   21.0pt     =  7.4mm  (品番○次工程)
     行12:   39.0pt     = 13.8mm  (依頼日 / 備考欄)
     行13:   15.0pt     =  5.3mm  (数量ラベル上 / 捺印ヘッダー)
     行14:   27.75pt    =  9.8mm  (数量値)
     行15:   39.0pt     = 13.8mm  (出荷日/便)
     行16:   39.0pt     = 13.8mm  (箱種)
     行17-19:13.5+13.5+14.25 = 14.6mm (フッター)
     合計: 142.0mm

   Excelフォーム 列幅（B-R列）:
     B=29.5mm(ラベル), C=1.0mm(区切), D=9.8mm(品番桁),
     E-N=各9.8mm(品番桁×10桁), O=29.5mm(注記), 
     P=16.4mm(備考), Q-R=各9.8mm(捺印)
     ※品番: D(1桁)E(2)F(3)G(4)H(5) ハイフン I J(6)K(7)L(8)M(9)N(10)
============================================================ */
@media print {
  @page{size:A4 portrait;margin:5mm 4mm;}
  .ui-panel,.scan-modal,#mainContent{display:none!important;}
  body{background:white;}
  #printArea{display:block!important;width:202mm;}

  /* 2列グリッド */
  .print-wrap{display:grid;grid-template-columns:1fr 1fr;gap:2mm;width:100%;}
  .slip:nth-child(2n){page-break-after:always;}
  .slip:last-child{page-break-after:auto;}

  /* ===== 伝票外枠 ===== */
  .slip{
    width:100%;
    border-left:2px solid #000;border-right:2px solid #000;
    border-top:2px solid #000;border-bottom:2px solid #000;
    font-family:"MS UI Gothic","Meiryo",sans-serif;
    page-break-inside:avoid;break-inside:avoid;
    overflow:hidden;
  }

  /* ===== 行1-6: タイトル (高さ28.8mm) ===== */
  .f-title{
    height:28.8mm;
    border-bottom:1px solid #000;
    display:flex;align-items:center;
    padding:0 5mm;
    font-size:20pt;letter-spacing:5px;
  }

  /* ===== 行7: 区切り行 (高さ6.9mm) ===== */
  .f-sep{height:6.9mm;border-bottom:1px solid #000;}

  /* ===== 品番エリア (行8-11) ===== */
  .f-hinban{display:flex;border-bottom:2px solid #000;}

  /* 「品番」ラベル: B列幅相当, 行8-11結合 */
  .f-hinban-lbl{
    width:12mm;min-width:12mm;
    border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:12pt;
    writing-mode:vertical-rl;text-orientation:upright;
    letter-spacing:5px;
  }

  .f-hinban-body{flex:1;display:flex;flex-direction:column;}

  /* 行8上部: かんばん確認注記 (高さ7.4mm) */
  .f-note-row{
    height:7.4mm;border-bottom:1px solid #000;
    display:flex;align-items:center;
    font-size:7pt;padding:0 2mm;
  }

  /* 行9: 品番値 (高さ13.0mm) */
  .f-hinban-vals{height:13.0mm;display:flex;border-bottom:1px solid #000;}
  .f-hv-cell{
    flex:1;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:15pt;font-weight:bold;
  }
  .f-hv-cell:last-child{border-right:none;}
  .f-hv-sep{
    flex:0 0 5mm;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:12pt;font-weight:bold;
  }

  /* 行10: 見本準備確認○ (高さ7.4mm) */
  /* 行11: 次工程確認○   (高さ7.4mm) */
  .f-chk-row{height:7.4mm;display:flex;border-bottom:1px solid #000;}
  .f-chk-row.last{border-bottom:none;}
  .f-ck-cell{
    flex:1;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:10pt;
  }
  .f-ck-cell:last-child{border-right:none;}
  .f-ck-cell.on{color:#c00;font-weight:bold;}
  .f-ck-sep{flex:0 0 5mm;border-right:1px solid #000;}

  /* ===== 行12: 依頼日 + 備考欄 (高さ13.8mm) ===== */
  .f-irai{height:13.8mm;display:flex;border-bottom:1px solid #000;}
  .f-row-lbl{
    width:12mm;min-width:12mm;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:10pt;
    writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;
  }
  .f-irai-val{
    flex:1;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:12pt;font-weight:bold;
  }
  /* 備考欄: P-R列(16.4+9.8+9.8=36mm), 行12-16結合 */
  .f-biko{
    width:36mm;min-width:36mm;
    padding:1mm 2mm;font-size:6.5pt;
    display:flex;flex-direction:column;justify-content:flex-start;
  }
  .f-biko-ttl{font-size:7.5pt;font-weight:bold;margin-bottom:1mm;}
  .f-biko-line{margin-bottom:1mm;}
  .f-biko-line b{font-weight:bold;}

  /* ===== 行13-14: 数量 (計15.1mm) ===== */
  .f-qty{display:flex;border-bottom:1px solid #000;}
  .f-qty-lbl{
    width:12mm;min-width:12mm;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:10pt;
    writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;
  }
  .f-qty-body{
    flex:1;border-right:1px solid #000;
    display:flex;flex-direction:column;
  }
  /* 行13: ヘッダー部 5.3mm */
  .f-qty-hdr{height:5.3mm;border-bottom:1px solid #000;}
  /* 行14: 数量値 9.8mm */
  .f-qty-val{
    height:9.8mm;
    display:flex;align-items:center;padding:0 2mm;gap:1mm;
  }
  .f-qty-num{font-size:18pt;font-weight:bold;text-decoration:underline;min-width:14mm;text-align:center;}
  .f-qty-unit{font-size:10pt;}
  .f-qty-x{font-size:13pt;margin:0 1mm;}
  .f-qty-box{font-size:18pt;font-weight:bold;min-width:10mm;text-align:center;}
  /* 捺印欄 3列 */
  .f-stamp-cols{display:flex;}
  .f-stamp-col{
    width:10mm;min-width:10mm;border-left:1px solid #000;
    display:flex;flex-direction:column;
  }
  .f-stamp-hdr{
    height:5.3mm;border-bottom:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:5pt;text-align:center;line-height:1.1;
    background:#f5f5f5;
  }
  .f-stamp-sp{height:9.8mm;}

  /* ===== 行15: 出荷日/便 (高さ13.8mm) ===== */
  .f-shukka{height:13.8mm;display:flex;border-bottom:1px solid #000;}
  .f-shukka-lbl{
    width:12mm;min-width:12mm;border-right:1px solid #000;
    display:flex;align-items:center;justify-content:center;
    font-size:7.5pt;
    writing-mode:vertical-rl;text-orientation:upright;letter-spacing:0;
  }
  .f-shukka-val{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-size:10pt;
  }

  /* ===== 行16: 箱種 (高さ13.8mm) ===== */
  .f-hakoshu{height:13.8mm;display:flex;border-bottom:1px solid #000;}
  .f-hakoshu-val{
    flex:1;display:flex;align-items:center;
    padding:0 3mm;font-size:12pt;font-weight:bold;
  }

  /* ===== 行17-19: フッター (高さ14.6mm) ===== */
  .f-footer{
    height:14.6mm;
    display:flex;align-items:center;justify-content:center;
    font-size:9pt;font-weight:bold;text-align:center;padding:0 2mm;
  }
}
</style>
</head>
<body>

<!-- ===== 操作パネル ===== -->
<div class="ui-panel">
  <div class="panel-title"><span>📦</span> 指示品依頼書システム</div>
  <div class="panel-btns">
    <button class="btn btn-scan" onclick="openScanner()">📷 QRスキャン</button>
    <button class="btn btn-print" id="printBtn" onclick="window.print()">🖨 印刷 / PDF保存</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑 全消去</button>
  </div>
  <div class="panel-status"><span id="status">📷 QRスキャンボタンを押してください</span></div>
</div>

<!-- ===== メインコンテンツ ===== -->
<div id="mainContent">
  <div class="empty-guide" id="emptyGuide">
    <div class="icon">📋</div>
    <p>現品確認票のQRコードをスキャンすると<br>指示品依頼書が自動生成されます</p>
    <button class="btn-scan-big" onclick="openScanner()">📷 QRコードをスキャン</button>
    <p style="font-size:12px;color:#999;margin-top:8px;">連続スキャン対応 ／ 整数箱＋端数箱 自動分割</p>
  </div>
  <div id="slipList"></div>
  <div id="printArea">
    <div class="print-wrap" id="printWrap"></div>
  </div>
</div>

<!-- ===== カメラスキャン ===== -->
<div class="scan-modal" id="scanModal">
  <div class="scan-header">
    <h2>📷 QRコードをかざしてください</h2>
    <button class="scan-close" onclick="closeScanner()">✕ 閉じる</button>
  </div>
  <div id="qrReaderWrap">
    <div id="qrReader"></div>
    <div class="scan-overlay">
      <div class="scan-frame"><span></span><div class="scan-line-anim"></div></div>
    </div>
  </div>
  <div class="scan-footer"><div id="scanStatusText">スキャン待機中...</div></div>
</div>

<script>
'use strict';

/* QRデータ解析 */
function parseQR(raw){
  if(!raw||raw.length<57)return null;
  const dateRaw=raw.substring(5,13),slipNo=raw.substring(15,22).trim(),
        hinbanRaw=raw.substring(29,39),total=parseInt(raw.substring(41,47))||0,
        hakoshu=raw.substring(47,52).trim(),std=parseInt(raw.substring(52,57))||0;
  const fullBoxes=std>0?Math.floor(total/std):0,fraction=std>0?total%std:total;
  let delivDate='';
  if(/^\d{8}$/.test(dateRaw))
    delivDate=parseInt(dateRaw.slice(4,6))+'月'+parseInt(dateRaw.slice(6,8))+'日';
  return{hinbanRaw,slipNo,delivDate,std,total,fullBoxes,fraction,hakoshu};
}

const _t=new Date();
const todayStr=_t.getFullYear()+'年'+(_t.getMonth()+1)+'月'+_t.getDate()+'日';
let items=[],sidCnt=0;

function setStatus(msg,cls=''){const el=document.getElementById('status');el.textContent=msg;el.className=cls;}
function updateUI(){
  const has=items.length>0;
  document.getElementById('emptyGuide').style.display=has?'none':'flex';
  document.getElementById('printBtn').style.display=has?'inline-flex':'none';
  if(!has)setStatus('📷 QRスキャンボタンを押してください');
}

/* スマホ プレビューカード */
function addCard(item){
  const{parsed,sid,slipTypes}=item;
  const p1=parsed.hinbanRaw.substring(0,5),p2=parsed.hinbanRaw.substring(5);
  const badges=slipTypes.map(t=>
    t.type==='full'
      ?`<span class="badge badge-full">${parsed.std}個×${t.boxes}箱</span>`
      :`<span class="badge badge-frac">${t.qty}個×1箱（端数）</span>`
  ).join(' ');
  const card=document.createElement('div');
  card.className='slip-card';card.id='card-'+sid;
  card.innerHTML=`
    <div class="slip-card-header">
      <span class="slip-card-title">📄 ${p1}-${p2}　${slipTypes.length}枚発行</span>
      <button class="slip-card-del" onclick="removeItem('${sid}')">✕ 削除</button>
    </div>
    <div class="slip-card-body">
      <div class="slip-card-row"><span class="slip-card-lbl">品番</span><span class="slip-card-val slip-card-hinban">${p1}-${p2}</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">発行内容</span><span class="slip-card-val" style="font-size:11px;">${badges}</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">合計数量</span><span class="slip-card-val big">${parsed.total} 個</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">顧客納入日</span><span class="slip-card-val">${parsed.delivDate||'―'}</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">納品書番号</span><span class="slip-card-val">${parsed.slipNo||'―'}</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">箱種</span><span class="slip-card-val">${parsed.hakoshu||'―'}</span></div>
      <div class="slip-card-row"><span class="slip-card-lbl">発行日</span><span class="slip-card-val">${todayStr}</span></div>
    </div>`;
  document.getElementById('slipList').appendChild(card);
}

/* 印刷用伝票HTML — Excelフォーム完全一致 */
function toggleChk(el){
  el.classList.toggle('on');
  el.textContent=el.classList.contains('on')?'✓':'○';
}

function buildSlipHTML(parsed,sid,qty,boxes,label){
  const h=(parsed.hinbanRaw||'').replace(/[-\s]/g,'');
  const p1=h.substring(0,5).split('');while(p1.length<5)p1.push('');
  const p2=h.substring(5,10).split('');while(p2.length<5)p2.push('');
  const title=label?`指示品依頼書【${label}】`:'指示品依頼書';

  // 品番値行 (行9): D-H(前半5桁) + ハイフンI + J-N(後半5桁)
  const hvRow=[
    ...p1.map(c=>`<div class="f-hv-cell">${c}</div>`),
    `<div class="f-hv-sep">―</div>`,
    ...p2.map(c=>`<div class="f-hv-cell">${c}</div>`),
  ].join('');

  // ○チェック行
  function chkRow(rid){
    return[
      ...p1.map((_,i)=>`<div class="f-ck-cell" onclick="toggleChk(this)" data-id="${sid}-${rid}-${i}">○</div>`),
      `<div class="f-ck-sep"></div>`,
      ...p2.map((_,i)=>`<div class="f-ck-cell" onclick="toggleChk(this)" data-id="${sid}-${rid}-${5+i}">○</div>`),
    ].join('');
  }

  return`<div class="slip" data-sid="${sid}">

  <!-- 行1-6: タイトル -->
  <div class="f-title">${title}</div>

  <!-- 行7: 区切り -->
  <div class="f-sep"></div>

  <!-- 行8-11: 品番エリア -->
  <div class="f-hinban">
    <div class="f-hinban-lbl">品番</div>
    <div class="f-hinban-body">
      <div class="f-note-row">←かんばんから転記時に確認。</div>

</div>`;
}

/* データ追加・削除 */
function processQRData(raw){
  const parsed=parseQR(raw);
  if(!parsed){setStatus('⚠️ QRデータの形式が正しくありません','error');return false;}
  const p1=parsed.hinbanRaw.substring(0,5),p2=parsed.hinbanRaw.substring(5);
  const slipTypes=[];
  if(parsed.fullBoxes>0)slipTypes.push({type:'full',qty:parsed.std,boxes:parsed.fullBoxes,label:'整数箱'});
  if(parsed.fraction>0) slipTypes.push({type:'frac',qty:parsed.fraction,boxes:1,label:'端数箱'});
  if(slipTypes.length===0){setStatus(`⚠️ ${p1}-${p2} 数量0のためスキップ`,'info');return true;}
  const sid='s'+(sidCnt++),needLabel=slipTypes.length>1;
  const item={parsed,sid,slipTypes};
  items.push(item);
  addCard(item);
  const pw=document.getElementById('printWrap');
  slipTypes.forEach((t,i)=>{
    pw.insertAdjacentHTML('beforeend',buildSlipHTML(parsed,sid+'_'+i,t.qty,t.boxes,needLabel?t.label:''));
  });
  const total=document.querySelectorAll('.slip').length;
  const desc=slipTypes.map(t=>t.type==='full'?`${t.qty}個×${t.boxes}箱`:`端数${t.qty}個`).join('＋');
  setStatus(`✅ ${p1}-${p2}（${desc}）追加　印刷${total}枚`,'ok');
  updateUI();return true;
}

function removeItem(sid){
  items=items.filter(it=>it.sid!==sid);
  const card=document.getElementById('card-'+sid);
  if(card)card.remove();
  document.querySelectorAll('.slip').forEach(s=>{
    const ds=s.getAttribute('data-sid')||'';
    if(ds===sid||ds.startsWith(sid+'_'))s.remove();
  });
  updateUI();
  const total=document.querySelectorAll('.slip').length;
  if(items.length===0)setStatus('📷 QRスキャンボタンを押してください');
  else setStatus(`伝票グループ${items.length}件　印刷${total}枚`,'ok');
}

function clearAll(){
  items=[];
  document.getElementById('slipList').innerHTML='';
  document.getElementById('printWrap').innerHTML='';
  document.getElementById('printBtn').style.display='none';
  updateUI();
}

/* カメラスキャン */
let qrScanner=null,lastScanText='',lastScanTime=0;

async function openScanner(){
  document.getElementById('scanModal').classList.add('show');
  document.getElementById('scanStatusText').textContent='カメラ起動中...';
  try{
    qrScanner=new Html5Qrcode('qrReader');
    await qrScanner.start(
      {facingMode:'environment'},
      {fps:15,qrbox:{width:240,height:240}},
      (text)=>{
        const now=Date.now();
        if(text===lastScanText&&now-lastScanTime<3000)return;
        lastScanText=text;lastScanTime=now;
        playBeep();
        const ok=processQRData(text);
        if(ok){
          document.getElementById('scanStatusText').textContent='✅ 読み取り完了！次のQRをかざしてください';
          document.getElementById('qrReaderWrap').style.background='#fff';
          setTimeout(()=>{document.getElementById('qrReaderWrap').style.background='';},150);
        }
      },
      ()=>{}
    );
    document.getElementById('scanStatusText').textContent='QRコードをかざしてください';
  }catch(err){
    let msg='カメラエラー: '+err.message;
    if(location.protocol==='file:')msg='⚠️ ローカルファイルではカメラ使用不可。httpsで開いてください。';
    document.getElementById('scanStatusText').textContent=msg;
  }
}

function closeScanner(){
  if(qrScanner){
    qrScanner.stop().catch(()=>{}).finally(()=>{
      qrScanner.clear();qrScanner=null;
      document.getElementById('qrReader').innerHTML='';
    });
  }
  document.getElementById('scanModal').classList.remove('show');
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=1000;
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.start();osc.stop(ctx.currentTime+0.15);
  }catch(e){}
}

let touchStartY=0;
document.getElementById('scanModal').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;});
document.getElementById('scanModal').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-touchStartY>80)closeScanner();
});

updateUI();
</script>
